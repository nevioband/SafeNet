<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anmeldung fehlgeschlagen – SafeNet Security</title>
    <link rel="stylesheet" href="css/navbar.css">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/footer.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="images/SafeNet-Security-Logo/Withoutbg/SafeNet Security 48 x 48 px.png">
    <style>
        .status-wrapper {
            min-height: calc(100vh - 120px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 60px 20px;
        }
        .status-card {
            background: #172441;
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 16px;
            padding: 48px 44px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
            text-align: center;
        }
        .status-icon {
            display: flex;
            justify-content: center;
            margin-bottom: 24px;
        }
        .status-icon svg {
            width: 60px;
            height: 60px;
            filter: drop-shadow(0 0 14px rgba(239, 68, 68, 0.45));
        }
        .status-card h2 {
            font-size: 26px;
            margin: 0 0 10px 0;
            background: linear-gradient(135deg, #ef4444, #f87171) !important;
            -webkit-background-clip: text !important;
            -webkit-text-fill-color: transparent !important;
            background-clip: text !important;
        }
        .status-card p {
            color: #94a3b8;
            font-size: 15px;
            margin: 0 0 32px 0;
            line-height: 1.6;
        }
        .status-btn {
            display: inline-block;
            width: 100%;
            padding: 13px 0;
            background: linear-gradient(135deg, #3399ff, #66d9ff);
            color: #0f172a;
            font-weight: 700;
            font-size: 15px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            font-family: 'Inter', sans-serif;
            box-sizing: border-box;
            transition: opacity 0.2s;
        }
        .status-btn:hover {
            opacity: 0.88;
        }
        .status-btn-ghost {
            display: inline-block;
            width: 100%;
            padding: 13px 0;
            background: transparent;
            color: #94a3b8;
            font-weight: 600;
            font-size: 15px;
            border: 1px solid rgba(59, 130, 246, 0.25);
            border-radius: 8px;
            cursor: pointer;
            text-decoration: none;
            font-family: 'Inter', sans-serif;
            box-sizing: border-box;
            margin-top: 12px;
            transition: border-color 0.2s, color 0.2s;
        }
        .status-btn-ghost:hover {
            border-color: #3399ff;
            color: white;
        }
    </style>
</head>
<body>
    <div id="navbar"></div>

    <main class="status-wrapper">
        <div class="status-card">
            <div class="status-icon">
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="12" cy="12" r="10" fill="#ef4444" opacity="0.15" stroke="#ef4444" stroke-width="1.5"/>
                    <line x1="8" y1="8" x2="16" y2="16" stroke="#ef4444" stroke-width="2" stroke-linecap="round"/>
                    <line x1="16" y1="8" x2="8" y2="16" stroke="#ef4444" stroke-width="2" stroke-linecap="round"/>
                </svg>
            </div>

            <h2>Anmeldung fehlgeschlagen!</h2>
            <p>Benutzername oder Passwort ist falsch.<br>Bitte versuche es erneut.</p>

            <a href="pages/login.html" class="status-btn">Erneut versuchen</a>
            <a href="/" class="status-btn-ghost">Zur Startseite</a>
        </div>
    </main>

    <div id="footer"></div>

    <script>
        fetch("partials/navbar.html")
            .then(res => res.text())
            .then(data => {
                document.getElementById("navbar").innerHTML = data;

                const toggle = document.querySelector(".menu-toggle");
                const navLinks = document.querySelector(".nav-links");
                const dropdown = document.querySelector(".dropdown");
                const dropdownLink = document.querySelector(".dropdown-link");

                toggle.addEventListener("click", () => {
                    navLinks.classList.toggle("active");
                    if (!navLinks.classList.contains("active")) {
                        dropdown.classList.remove("open");
                    }
                });

                dropdownLink.addEventListener("click", (e) => {
                    if (window.innerWidth <= 768) {
                        const isOpen = dropdown.classList.contains("open");
                        if (!isOpen) {
                            e.preventDefault();
                            dropdown.classList.add("open");
                        }
                    }
                });
            });

        fetch("partials/footer.html")
            .then(res => res.text())
            .then(data => { document.getElementById("footer").innerHTML = data; });
    </script>
</body>
</html>
