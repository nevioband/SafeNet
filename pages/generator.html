<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Passwort-Generator</title>
    <link rel="stylesheet" href="../css/navbar.css" />
    <link rel="stylesheet" href="../css/style.css" />
    <link rel="stylesheet" href="../css/infobox.css" />
    <link rel="stylesheet" href="../css/hero.css" />
    <link rel="stylesheet" href="../css/footer.css" />
    <link rel="stylesheet" href="../css/analyse.css" />
    <link rel="stylesheet" href="../css/keylogger.css" />
    <link rel="stylesheet" href="../css/phishing.css" />
    <link rel="stylesheet" href="../css/generator.css" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="icon" type="image/png" href="../images/SafeNet-Security-Logo/Withoutbg/SafeNet Security 48 x 48 px.png">
    <script type="module" src="../js/auth.js?v=3"></script>
  </head>
  <body>
    <div id="navbar"></div>

    <div class="password-container">
        <h3>Passwort Generator</h3>
        
        <div class="display-box">
            <input type="text" id="password-output" readonly placeholder="Klicke auf Generieren">
            <button id="copy-btn" title="Kopieren" aria-label="Passwort kopieren">
                <span class="material-symbols-outlined">content_copy</span>
            </button>
        </div>

        <div class="settings">
            <label>Länge: <span id="length-val">16</span></label>
            <input type="range" id="length-slider" min="8" max="50" value="16">

            <div class="checkbox-grid">
                <label class="custom-check">
                    <input type="checkbox" id="include-lowercase" checked>
                    <span class="check-label">abc</span>
                </label>
                <label class="custom-check">
                    <input type="checkbox" id="include-uppercase" checked>
                    <span class="check-label">ABC</span>
                </label>
                <label class="custom-check">
                    <input type="checkbox" id="include-numbers" checked>
                    <span class="check-label">123</span>
                </label>
                <label class="custom-check">
                    <input type="checkbox" id="include-symbols" checked>
                    <span class="check-label">#$&</span>
                </label>
            </div>
        </div>

        <div class="settings" style="margin-top: 20px;">
            <label for="password-label">Name für das Passwort:</label>
            <div class="input-group-row">
                <input type="text" id="password-label" placeholder="z.B. Instagram, Google, Bank">
                <button class="main-btn" onclick="transferToVault()" style="width: auto; margin-top: 0; white-space: nowrap; display: flex; align-items: center; gap: 5px; padding: 0 15px;">
                    <span class="material-symbols-outlined" style="font-size: 20px;">shield</span> Sichern
                </button>
            </div>
        </div>

        <button id="generate-btn" class="main-btn">Sicheres Passwort erstellen</button>
    </div>

    <script>
    const outputEl = document.getElementById('password-output');
    const lengthEl = document.getElementById('length-slider');
    const lengthVal = document.getElementById('length-val');

    const lowerEl = document.getElementById('include-lowercase');
    const upperEl = document.getElementById('include-uppercase');
    const numberEl = document.getElementById('include-numbers');
    const symbolEl = document.getElementById('include-symbols');

    const generateBtn = document.getElementById('generate-btn');

    lengthEl.addEventListener('input', () => {
      lengthVal.innerText = lengthEl.value;
    });

    const charSets = {
      lower: "abcdefghijklmnopqrstuvwxyz",
      upper: "ABCDEFGHIJKLMNOPQRSTUVWXYZ",
      number: "0123456789",
      symbol: "!@#$%^&*()_+~`|}{[]:;?><,./-="
    };

    const checkboxes = [lowerEl, upperEl, numberEl, symbolEl];
    checkboxes.forEach(cb => {
      cb.addEventListener("change", () => {
        const checkedCount = checkboxes.filter(c => c.checked).length;
        if (checkedCount === 0) {
          cb.checked = true;
          alert("Mindestens eine Option muss aktiv sein!");
        }
      });
    });

    function getRandomChar(str) {
      const array = new Uint32Array(1);
      window.crypto.getRandomValues(array);
      return str[array[0] % str.length];
    }

    function generatePassword() {
      const length = parseInt(lengthEl.value);
      let allowedChars = "";
      let passwordArray = [];

      if (lowerEl.checked) {
        allowedChars += charSets.lower;
        passwordArray.push(getRandomChar(charSets.lower));
      }
      if (upperEl.checked) {
        allowedChars += charSets.upper;
        passwordArray.push(getRandomChar(charSets.upper));
      }
      if (numberEl.checked) {
        allowedChars += charSets.number;
        passwordArray.push(getRandomChar(charSets.number));
      }
      if (symbolEl.checked) {
        allowedChars += charSets.symbol;
        passwordArray.push(getRandomChar(charSets.symbol));
      }

      const remainingLength = length - passwordArray.length;
      for (let i = 0; i < remainingLength; i++) {
        passwordArray.push(getRandomChar(allowedChars));
      }

      for (let i = passwordArray.length - 1; i > 0; i--) {
        const j = window.crypto.getRandomValues(new Uint32Array(1))[0] % (i + 1);
        [passwordArray[i], passwordArray[j]] = [passwordArray[j], passwordArray[i]];
      }

      outputEl.value = passwordArray.join('');
    }

    generateBtn.addEventListener('click', generatePassword);

    document.getElementById('copy-btn').addEventListener('click', () => {
      if (!outputEl.value) return;
      navigator.clipboard.writeText(outputEl.value);
      alert("Kopiert!");
    });
    </script>

    <div id="footer"></div>
    <script>
      fetch("../partials/footer.html").then(res => res.text()).then(data => { document.getElementById("footer").innerHTML = data; });
      fetch("../partials/navbar.html").then(res => res.text()).then(data => {
          document.getElementById("navbar").innerHTML = data;
          const toggle = document.querySelector(".menu-toggle");
          const navLinks = document.querySelector(".nav-links");
          const dropdownLink = document.querySelector(".dropdown-link");
          const dropdown = document.querySelector(".dropdown");
          toggle.addEventListener("click", () => { navLinks.classList.toggle("active"); });
          dropdownLink.addEventListener("click", (e) => {
            if (window.innerWidth <= 768) {
              e.preventDefault();
              dropdown.classList.toggle("open");
            }
          });
      });
    </script>
    <script type="module" src="../js/tresor.js?v=4"></script>
  </body>
</html>
