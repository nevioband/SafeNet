<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kontakt – SafeNet Security</title>
    <link rel="icon" type="image/png" href="../images/SafeNet-Security-Logo/Withoutbg/SafeNet Security 48 x 48 px.png" />
    <link rel="stylesheet" href="../css/style.css" />
    <link rel="stylesheet" href="../css/shared.css" />
    <link rel="stylesheet" href="../css/navbar.css" />
    <link rel="stylesheet" href="../css/footer.css" />
    <link rel="stylesheet" href="../css/kontakt.css" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet" />
    <script type="module" src="../js/auth.js"></script>
    <script type="module" src="../js/kontakt.js"></script>
  </head>
  <body>
    <div id="navbar"></div>
    <main class="kontakt-main">
      <section class="kontakt-section">
        <h1>Kontakt</h1>
        <form id="kontakt-form" class="kontakt-form">
          <label for="name">Name (optional)</label>
          <input type="text" id="name" name="name" maxlength="50" autocomplete="name" />

          <label for="email">E-Mail<span class="pflicht">*</span></label>
          <input type="email" id="email" name="email" required maxlength="100" autocomplete="email" />

          <label for="nachricht">Nachricht<span class="pflicht">*</span></label>
          <textarea id="nachricht" name="nachricht" required maxlength="1000" rows="6"></textarea>

          <button type="submit" class="btn-primary">Absenden</button>
          <div id="kontakt-feedback" class="kontakt-feedback"></div>
        </form>
      </section>
    </main>
    <div id="footer"></div>
    <script>
      fetch("../partials/navbar.html").then(r=>r.text()).then(d=>{document.getElementById("navbar").innerHTML=d});
      fetch("../partials/footer.html").then(r=>r.text()).then(d=>{document.getElementById("footer").innerHTML=d});
    </script>
  </body>
</html>
