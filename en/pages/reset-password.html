<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password – SafeNet Security</title>    <meta name="description" content="Reset your SafeNet Security password. Enter your email and receive a reset link." />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Reset Password – SafeNet Security" />
    <meta property="og:description" content="Reset your SafeNet Security password. Enter your email and receive a reset link." />
    <meta property="og:image" content="https://safenet-security.ch/images/SafeNet-Security-Logo/Withbg/ShieldWhiteName.png" />
    <link rel="stylesheet" href="/css/navbar.css">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/shared.css">
    <link rel="stylesheet" href="/css/footer.css">
    <link rel="stylesheet" href="/css/login.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="/images/SafeNet-Security-Logo/Withoutbg/SafeNet Security 48 x 48 px.png">
</head>
<body>
    <div id="navbar"></div>
    <h1 class="sr-only">Reset Password</h1>
    <main class="login-wrapper">
        <div class="login-card">

            <div class="login-icon">
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <linearGradient id="keyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#3399ff"/>
                            <stop offset="100%" stop-color="#66d9ff"/>
                        </linearGradient>
                    </defs>
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2" stroke="url(#keyGrad)" stroke-width="1.5" fill="url(#keyGrad)" fill-opacity="0.15"/>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4" stroke="url(#keyGrad)" stroke-width="1.5" stroke-linecap="round"/>
                </svg>
            </div>

            <h2>New password</h2>
            <p class="login-subtitle">Enter your new password</p>

            <div id="errorBox" class="error-box hidden">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
                </svg>
                <span id="errorText">Error resetting password.</span>
            </div>

            <div id="invalidBox">
                This link is invalid or has expired.<br>
                <a href="login.html">Back to login</a>
            </div>

            <div id="formBox">
                <div class="form-group">
                    <label for="newPass">New password</label>
                    <div class="input-wrapper">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                        </svg>
                        <input type="password" id="newPass" placeholder="New password (min. 6 characters)" autocomplete="new-password">
                        <button class="password-toggle" type="button" id="togglePass" aria-label="Show password">
                            <svg id="eyeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                            </svg>
                        </button>
                    </div>
                </div>

                <div class="form-group">
                    <label for="confirmPass">Confirm password</label>
                    <div class="input-wrapper">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                        </svg>
                        <input type="password" id="confirmPass" placeholder="Repeat password" autocomplete="new-password">
                    </div>
                </div>

                <button class="login-btn" id="resetBtn">Save password</button>
            </div>

            <div id="successBox">
                <div class="success-message">
                    Password successfully changed!
                </div>
                <a href="login.html" class="login-btn">Go to login</a>
            </div>
        </div>
    </main>
    <div id="footer"></div>
    <script src="/js/navbar-loader.js"></script>
    <script type="module" src="/js/reset-password-en.js"></script>
  </body>
</html>
