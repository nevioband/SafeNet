<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password – SafeNet Security</title>    <meta name="description" content="Reset your SafeNet Security password. Enter your email and receive a reset link." />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Reset Password – SafeNet Security" />
    <meta property="og:description" content="Reset your SafeNet Security password. Enter your email and receive a reset link." />
    <meta property="og:image" content="https://safe-net-umber.vercel.app/images/SafeNet-Security-Logo/Withbg/ShieldWhiteName.png" />
    <meta property="og:url" content="https://safe-net-umber.vercel.app/en/pages/reset-password.html" />    <link rel="stylesheet" href="/css/navbar.css">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/shared.css">
    <link rel="stylesheet" href="/css/footer.css">
    <link rel="stylesheet" href="/css/login.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="/images/SafeNet-Security-Logo/Withoutbg/SafeNet Security 48 x 48 px.png">
</head>
<body>
    <div id="navbar"></div>

    <main class="login-wrapper">
        <div class="login-card">

            <div class="login-icon">
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <linearGradient id="keyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#3399ff"/>
                            <stop offset="100%" stop-color="#66d9ff"/>
                        </linearGradient>
                    </defs>
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2" stroke="url(#keyGrad)" stroke-width="1.5" fill="url(#keyGrad)" fill-opacity="0.15"/>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4" stroke="url(#keyGrad)" stroke-width="1.5" stroke-linecap="round"/>
                </svg>
            </div>

            <h2>New password</h2>
            <p class="login-subtitle">Enter your new password</p>

            <div id="errorBox" class="error-box hidden">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
                </svg>
                <span id="errorText">Error resetting password.</span>
            </div>

            <div id="invalidBox">
                This link is invalid or has expired.<br>
                <a href="login.html">Back to login</a>
            </div>

            <div id="formBox">
                <div class="form-group">
                    <label for="newPass">New password</label>
                    <div class="input-wrapper">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                        </svg>
                        <input type="password" id="newPass" placeholder="New password (min. 6 characters)" autocomplete="new-password">
                        <button class="password-toggle" type="button" id="togglePass" aria-label="Show password">
                            <svg id="eyeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                            </svg>
                        </button>
                    </div>
                </div>

                <div class="form-group">
                    <label for="confirmPass">Confirm password</label>
                    <div class="input-wrapper">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                        </svg>
                        <input type="password" id="confirmPass" placeholder="Repeat password" autocomplete="new-password">
                    </div>
                </div>

                <button class="login-btn" id="resetBtn">Save password</button>
            </div>

            <div id="successBox">
                <div class="success-message">
                    Password successfully changed!
                </div>
                <a href="login.html" class="login-btn">Go to login</a>
            </div>
        </div>
    </main>

    <div id="footer"></div>

    <script type="module">
        import { supabase } from '/js/supabase.js'

        function supabaseError(msg) {
            if (!msg) return 'An unknown error occurred.'
            const m = msg.toLowerCase()
            if (m.includes('same password') || m.includes('different from')) return 'Your new password must differ from the old one.'
            if (m.includes('weak password') || m.includes('at least')) return 'Password is too weak. Please choose a stronger one.'
            if (m.includes('session') || m.includes('token') || m.includes('expired')) return 'This link has expired. Please request a new reset link.'
            if (m.includes('network') || m.includes('fetch')) return 'Connection error. Please check your internet connection.'
            return 'Error: ' + msg
        }

        // Hide form initially until session is confirmed
        document.getElementById('formBox').style.display = 'none'

        // Supabase processes the token from the URL automatically
        supabase.auth.onAuthStateChange((event, session) => {
            if (event === 'PASSWORD_RECOVERY') {
                document.getElementById('formBox').style.display = 'block'
                document.getElementById('invalidBox').style.display = 'none'
            }
        })

        // Fallback: check existing session (e.g. already logged in)
        const { data: { session } } = await supabase.auth.getSession()
        if (session) {
            document.getElementById('formBox').style.display = 'block'
        } else {
            // Wait briefly in case onAuthStateChange still fires
            setTimeout(() => {
                if (document.getElementById('formBox').style.display === 'none') {
                    document.getElementById('invalidBox').style.display = 'block'
                }
            }, 2000)
        }

        document.getElementById('togglePass').addEventListener('click', () => {
            const input = document.getElementById('newPass')
            const icon = document.getElementById('eyeIcon')
            if (input.type === 'password') {
                input.type = 'text'
                icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>'
            } else {
                input.type = 'password'
                icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>'
            }
        })

        document.getElementById('resetBtn').addEventListener('click', async () => {
            const newPass = document.getElementById('newPass').value
            const confirmPass = document.getElementById('confirmPass').value
            const errorBox = document.getElementById('errorBox')
            const errorTxt = document.getElementById('errorText')
            const btn = document.getElementById('resetBtn')

            errorBox.classList.add('hidden')

            if (!newPass || !confirmPass) {
                errorTxt.textContent = 'Please fill in both fields.'
                errorBox.classList.remove('hidden')
                return
            }
            if (newPass.length < 6) {
                errorTxt.textContent = 'Password must be at least 6 characters long.'
                errorBox.classList.remove('hidden')
                return
            }
            if (newPass !== confirmPass) {
                errorTxt.textContent = 'Passwords do not match.'
                errorBox.classList.remove('hidden')
                return
            }

            btn.textContent = 'Saving…'
            btn.disabled = true

            const { error } = await supabase.auth.updateUser({ password: newPass })

            if (error) {
                errorTxt.textContent = supabaseError(error.message)
                errorBox.classList.remove('hidden')
                btn.textContent = 'Save password'
                btn.disabled = false
            } else {
                document.getElementById('formBox').style.display = 'none'
                document.getElementById('successBox').style.display = 'block'
            }
        })

        fetch('/en/partials/navbar.html').then(r => r.text()).then(d => {
            document.getElementById('navbar').innerHTML = d
            const toggle = document.querySelector('.menu-toggle')
            const navLinks = document.querySelector('.nav-links')
            const dropdown = document.querySelector('.dropdown')
            const dropdownLink = document.querySelector('.dropdown-link')
            if (toggle) toggle.addEventListener('click', () => { navLinks.classList.toggle('active'); if (!navLinks.classList.contains('active')) dropdown.classList.remove('open') })
            if (dropdownLink) dropdownLink.addEventListener('click', (e) => { if (window.innerWidth <= 768) { if (!dropdown.classList.contains('open')) { e.preventDefault(); dropdown.classList.add('open') } } })
        })
        fetch('/en/partials/footer.html').then(r => r.text()).then(d => { document.getElementById('footer').innerHTML = d })
    </script>
</body>
</html>
