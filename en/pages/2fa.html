<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Two-Factor Authentication – SafeNet Security</title>
    <link rel="stylesheet" href="/css/navbar.css">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/footer.css">
    <link rel="stylesheet" href="/css/shared.css">
    <link rel="stylesheet" href="/css/login.css">
    <link rel="stylesheet" href="/css/2fa.css">
    <link rel="icon" type="image/png" href="/images/SafeNet-Security-Logo/Withoutbg/SafeNet Security 48 x 48 px.png">
    <script type="module" src="/js/auth.js?v=5"></script>
</head>
<body>
    <div id="navbar"></div>

    <div class="tfa-container">
        <div class="tfa-card">
            <h2>Two-Factor Authentication</h2>
            <p class="tfa-subtitle">Protect your account with a second security factor.</p>

            <div id="statusBadge" class="status-badge status-off">
                <span>●</span> <span id="statusText">Loading…</span>
            </div>

            <div id="msgBox" class="msg-box"></div>

            <div class="tfa-info" id="infoText">
                With 2FA, you need to enter a 6-digit code from an authenticator app at login (e.g. Google Authenticator, Authy).
            </div>

            <!-- Status: disabled -->
            <div id="sectionOff">
                <button class="tfa-btn tfa-btn-primary" id="enableBtn">Enable 2FA</button>
            </div>

            <!-- QR code + verification -->
            <div id="qrSection">
                <p style="color:#cbd5e1;font-size:14px;margin:0 0 4px;">Scan this QR code with your authenticator app:</p>
                <img id="qrImg" class="qr-img" width="200" height="200" alt="QR Code" />
                <p style="color:#94a3b8;font-size:13px;margin:8px 0 0;text-align:center;">Or enter this code manually:</p>
                <p id="secretText" style="color:#66d9ff;font-size:13px;font-family:monospace;letter-spacing:3px;text-align:center;word-break:break-all;margin:6px 0 0;"></p>
                <input type="text" inputmode="numeric" maxlength="6" class="code-input" id="verifyCode" placeholder="123456">
                <button class="tfa-btn tfa-btn-primary" id="verifyBtn">Confirm &amp; activate</button>
                <button class="tfa-btn tfa-btn-secondary" id="cancelEnrollBtn" style="margin-top:8px;">Cancel</button>
            </div>

            <!-- Status: enabled -->
            <div id="sectionOn" style="display:none;">
                <button class="tfa-btn tfa-btn-danger" id="disableBtn">Disable 2FA</button>
            </div>
        </div>
    </div>

    <div id="footer"></div>

    <script>
        fetch('/en/partials/navbar.html').then(r => r.text()).then(d => {
            document.getElementById('navbar').innerHTML = d
            const toggle = document.querySelector('.menu-toggle')
            const navLinks = document.querySelector('.nav-links')
            if (toggle) toggle.addEventListener('click', () => navLinks.classList.toggle('active'))
        })
        fetch('/en/partials/footer.html').then(r => r.text()).then(d => {
            document.getElementById('footer').innerHTML = d
        })
    </script>

    <script type="module">
        import { supabase } from '/js/supabase.js?v=8'

        let enrolledFactorId = null

        function showMsg(text, type = 'error') {
            const box = document.getElementById('msgBox')
            box.textContent = text
            box.className = 'msg-box ' + (type === 'success' ? 'msg-success' : 'msg-error')
            box.style.display = 'block'
        }
        function hideMsg() { document.getElementById('msgBox').style.display = 'none' }

        async function loadStatus() {
            const { data: { session } } = await supabase.auth.getSession()
            if (!session) { window.location.href = 'login.html'; return }

            const { data, error } = await supabase.auth.mfa.listFactors()
            if (error) { showMsg('Error loading 2FA status.'); return }

            const totpFactors = data.totp || []
            const verified = totpFactors.find(f => f.status === 'verified')

            if (verified) {
                enrolledFactorId = verified.id
                document.getElementById('statusBadge').className = 'status-badge status-on'
                document.getElementById('statusText').textContent = '2FA enabled'
                document.getElementById('sectionOff').style.display = 'none'
                document.getElementById('sectionOn').style.display = 'block'
                document.getElementById('qrSection').style.display = 'none'
                document.getElementById('infoText').textContent = '2FA is active. At your next login you will be prompted for a code from your authenticator app.'
            } else {
                document.getElementById('statusBadge').className = 'status-badge status-off'
                document.getElementById('statusText').textContent = '2FA disabled'
                document.getElementById('sectionOff').style.display = 'block'
                document.getElementById('sectionOn').style.display = 'none'
                document.getElementById('qrSection').style.display = 'none'
            }
        }

        document.getElementById('enableBtn').addEventListener('click', async () => {
            hideMsg()
            const btn = document.getElementById('enableBtn')
            btn.textContent = 'Preparing…'
            btn.disabled = true

            const { data, error } = await supabase.auth.mfa.enroll({ factorType: 'totp', friendlyName: 'SafeNet Authenticator' })

            btn.textContent = 'Enable 2FA'
            btn.disabled = false

            if (error) { showMsg('Error: ' + error.message); return }

            enrolledFactorId = data.id
            document.getElementById('qrImg').src = data.totp.qr_code
            document.getElementById('secretText').textContent = data.totp.secret
            document.getElementById('sectionOff').style.display = 'none'
            document.getElementById('qrSection').style.display = 'block'
        })

        document.getElementById('verifyBtn').addEventListener('click', async () => {
            hideMsg()
            const code = document.getElementById('verifyCode').value.trim()
            if (!code || code.length !== 6) { showMsg('Please enter a 6-digit code.'); return }

            const btn = document.getElementById('verifyBtn')
            btn.textContent = 'Verifying…'
            btn.disabled = true

            const { data: challengeData, error: challengeError } = await supabase.auth.mfa.challenge({ factorId: enrolledFactorId })
            if (challengeError) { showMsg('Error: ' + challengeError.message); btn.textContent = 'Confirm & activate'; btn.disabled = false; return }

            const { error: verifyError } = await supabase.auth.mfa.verify({
                factorId: enrolledFactorId,
                challengeId: challengeData.id,
                code
            })

            btn.textContent = 'Confirm & activate'
            btn.disabled = false

            if (verifyError) { showMsg('Incorrect code. Please try again.'); return }

            showMsg('2FA has been successfully enabled!', 'success')
            document.getElementById('verifyCode').value = ''
            await loadStatus()
        })

        document.getElementById('cancelEnrollBtn').addEventListener('click', async () => {
            if (enrolledFactorId) {
                await supabase.auth.mfa.unenroll({ factorId: enrolledFactorId })
                enrolledFactorId = null
            }
            await loadStatus()
        })

        document.getElementById('disableBtn').addEventListener('click', async () => {
            if (!confirm('Really disable 2FA? Your account will be less secure.')) return
            hideMsg()
            const btn = document.getElementById('disableBtn')
            btn.textContent = 'Disabling…'
            btn.disabled = true

            const { error } = await supabase.auth.mfa.unenroll({ factorId: enrolledFactorId })
            btn.textContent = 'Disable 2FA'
            btn.disabled = false

            if (error) { showMsg('Error: ' + error.message); return }
            showMsg('2FA has been disabled.', 'success')
            enrolledFactorId = null
            await loadStatus()
        })

        loadStatus()
    </script>
</body>
</html>
