<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register – SafeNet Security</title>    <meta name="description" content="Create a free SafeNet Security account and get started with secure password management." />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Register – SafeNet Security" />
    <meta property="og:description" content="Create a free SafeNet Security account and get started with secure password management." />
    <meta property="og:image" content="https://safenet-security.ch/images/SafeNet-Security-Logo/Withbg/ShieldWhiteName.png" />
    <link rel="stylesheet" href="/css/navbar.css">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/shared.css">
    <link rel="stylesheet" href="/css/footer.css">
    <link rel="stylesheet" href="/css/login.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="/images/SafeNet-Security-Logo/Withoutbg/SafeNet Security 48 x 48 px.png">
</head>
<body>
    <div id="navbar"></div>
    <h1 class="sr-only">Register</h1>
    <main class="login-wrapper">
        <div class="login-card">

            <div class="login-icon">
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <linearGradient id="regGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#3399ff"/>
                            <stop offset="100%" stop-color="#66d9ff"/>
                        </linearGradient>
                    </defs>
                    <circle cx="12" cy="8" r="4" stroke="url(#regGrad)" stroke-width="1.5" fill="url(#regGrad)" fill-opacity="0.2"/>
                    <path d="M4 20c0-4 3.58-7 8-7s8 3 8 7" stroke="url(#regGrad)" stroke-width="1.5" stroke-linecap="round"/>
                    <line x1="19" y1="3" x2="19" y2="7" stroke="url(#regGrad)" stroke-width="1.5" stroke-linecap="round"/>
                    <line x1="17" y1="5" x2="21" y2="5" stroke="url(#regGrad)" stroke-width="1.5" stroke-linecap="round"/>
                </svg>
            </div>

            <h2>Create account</h2>
            <p class="login-subtitle">Sign up for SafeNet Security</p>

            <div id="errorBox" class="error-box hidden">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
                </svg>
                <span id="errorText">Please fill in all fields.</span>
            </div>

            <div id="successBox" class="success-box">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16">
                    <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/>
                </svg>
                <span id="successText">Registration successful! Please confirm your email.</span>
            </div>

            <div class="form-group">
                <label for="regEmail">Email address</label>
                <div class="input-wrapper">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="2" y="4" width="20" height="16" rx="2"/><path d="M2 7l10 7 10-7"/>
                    </svg>
                    <input type="email" id="regEmail" placeholder="Enter email" autocomplete="email">
                </div>
            </div>

            <div class="form-group">
                <label for="regPass">Password</label>
                <div class="input-wrapper">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                    </svg>
                    <input type="password" id="regPass" placeholder="Choose password (min. 6 characters)" autocomplete="new-password">
                    <button class="password-toggle" type="button" id="togglePass" aria-label="Show password">
                        <svg id="eyeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                        </svg>
                    </button>
                </div>
            </div>

            <div class="form-group">
                <label for="regPassConfirm">Confirm password</label>
                <div class="input-wrapper">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                    </svg>
                    <input type="password" id="regPassConfirm" placeholder="Repeat password" autocomplete="new-password">
                </div>
            </div>

            <button class="login-btn" id="registerBtn">Register</button>

            <div class="login-footer">
                Already have an account? <a href="login.html">Sign in</a>
            </div>
        </div>
    <div id="footer"></div>
    <script src="/js/navbar-loader.js"></script>
    <script type="module" src="/js/register-en.js"></script>
  </body>
</html>
