<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Feedback – SafeNet Security</title>
    <meta name="description" content="Share your thoughts on SafeNet Security – star rating, category, and optional comment." />
    <link rel="canonical" href="https://safenet-security.ch/en/pages/feedback.html" />
    <link rel="alternate" hreflang="de" href="https://safenet-security.ch/de/pages/feedback.html" />
    <link rel="alternate" hreflang="en" href="https://safenet-security.ch/en/pages/feedback.html" />
    <link rel="icon" type="image/png" href="/images/SafeNet-Security-Logo/Withoutbg/SafeNet Security 48 x 48 px.png" />
    <link rel="stylesheet" href="/css/navbar.css" />
    <link rel="stylesheet" href="/css/style.css" />
    <link rel="stylesheet" href="/css/shared.css" />
    <link rel="stylesheet" href="/css/footer.css" />
    <link rel="stylesheet" href="/css/feedback.css" />
    <script type="module" src="/js/auth.js?v=8"></script>
    <script type="module" src="/js/feedback-en.js"></script>
  </head>
  <body>
    <div id="navbar"></div>

    <main class="feedback-main">
      <div class="feedback-card">
        <h1>Your Feedback</h1>
        <p class="feedback-subtitle">Help us improve SafeNet Security!</p>

        <!-- Star Rating -->
        <div class="star-group" role="radiogroup" aria-label="Rating">
          <input type="radio" name="bewertung" id="stern5" value="5" />
          <label for="stern5" title="Excellent">★</label>
          <input type="radio" name="bewertung" id="stern4" value="4" />
          <label for="stern4" title="Good">★</label>
          <input type="radio" name="bewertung" id="stern3" value="3" />
          <label for="stern3" title="Okay">★</label>
          <input type="radio" name="bewertung" id="stern2" value="2" />
          <label for="stern2" title="Needs improvement">★</label>
          <input type="radio" name="bewertung" id="stern1" value="1" />
          <label for="stern1" title="Poor">★</label>
        </div>
        <p class="star-label" id="stern-text"></p>

        <!-- Category -->
        <div class="kategorie-group" role="radiogroup" aria-label="Category">
          <input type="radio" name="kategorie" id="kat-lob" value="Praise" />
          <label for="kat-lob">👍 Praise</label>
          <input type="radio" name="kategorie" id="kat-feature" value="Feature Request" />
          <label for="kat-feature">💡 Feature Request</label>
          <input type="radio" name="kategorie" id="kat-bug" value="Bug Report" />
          <label for="kat-bug">🐛 Bug Report</label>
          <input type="radio" name="kategorie" id="kat-sonstiges" value="Other" />
          <label for="kat-sonstiges">💬 Other</label>
        </div>

        <!-- Form -->
        <form id="feedback-form" class="feedback-form" novalidate>
          <label class="field-label" for="nachricht">Comment <span class="field-optional">(optional)</span></label>
          <textarea id="nachricht" name="nachricht" maxlength="800"
            placeholder="What do you like? What could we improve?"></textarea>
          <p id="feedback-status" class="feedback-status" role="status"></p>
          <button type="submit" class="btn-primary">Submit Feedback</button>
        </form>
      </div>
    </main>

    <div id="footer"></div>
    <script src="/js/navbar-loader.js"></script>
  </body>
</html>
