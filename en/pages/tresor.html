<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Password Vault – SafeNet Security</title>
    <meta name="description" content="Store your passwords securely in the encrypted SafeNet Vault. AES-256 encryption directly in your browser – safe and private." />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Password Vault – SafeNet Security" />
    <meta property="og:description" content="Store your passwords securely in the encrypted SafeNet Vault. AES-256 encryption directly in your browser – safe and private." />
    <meta property="og:image" content="https://safenet-security.ch/images/SafeNet-Security-Logo/Withbg/ShieldWhiteName.png" />
    <meta property="og:url" content="https://safenet-security.ch/en/pages/tresor.html" />
    <link rel="canonical" href="https://safenet-security.ch/en/pages/tresor.html" />
    <link rel="alternate" hreflang="de" href="https://safenet-security.ch/de/pages/tresor.html" />
    <link rel="alternate" hreflang="en" href="https://safenet-security.ch/en/pages/tresor.html" />
    <link rel="alternate" hreflang="x-default" href="https://safenet-security.ch/en/pages/tresor.html" />
    <link rel="stylesheet" href="/css/navbar.css" />
    <link rel="stylesheet" href="/css/style.css" />
    <link rel="stylesheet" href="/css/shared.css" />
    <link rel="stylesheet" href="/css/footer.css" />
    <link rel="stylesheet" href="/css/generator.css" />
    <link rel="stylesheet" href="/css/tresor.css" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="icon" type="image/png" href="/images/SafeNet-Security-Logo/Withoutbg/SafeNet Security 48 x 48 px.png">
    <script type="module" src="/js/auth.js?v=9"></script>
</head>
<body>
    <div id="navbar"></div>

    <div class="password-container">
        <h1>Your Vault</h1>

        <!-- Search Field -->
        <div id="vaultSearchContainer">
            <span class="material-symbols-outlined">search</span>
            <input type="text" id="vaultSearch" placeholder="Search password…">
        </div>
        
        <div id="saved-passwords-list" class="vault-list"></div>

        <div class="settings vault-buttons">
            <button id="btnOpenManual" class="main-btn vault-action-btn">
                <span class="material-symbols-outlined">lock</span> Save password manually
            </button>

            <button id="btnClearVault" class="main-btn-delete vault-action-btn">
                <span class="material-symbols-outlined">delete_sweep</span> Delete all
            </button>

            <!-- CSV Import -->
            <input type="file" id="csvFileInput" accept=".csv" aria-label="Import CSV file">

            <a href="generator.html" class="vault-generator-link">
                <button class="main-btn vault-action-btn">
                    <span class="material-symbols-outlined">add</span> Generate new password
                </button>
            </a>

            <div class="vault-import-export">
                <button id="btnImportCSV" class="vault-icon-btn">
                    <span class="material-symbols-outlined">upload_file</span> Import
                </button>
                <button id="btnExportCSV" class="vault-icon-btn">
                    <span class="material-symbols-outlined">download</span> Export
                </button>
            </div>
        </div>
    </div>

    <!-- Manual Password Modal -->
    <div id="manualModal">
        <div class="vault-modal-card">
            <h3 class="vault-modal-title">Save password manually</h3>

            <div class="vault-modal-field">
                <label class="vault-modal-label">Name / Description</label>
                <input type="text" id="manualLabel" placeholder="e.g. Instagram, Google, Bank" class="vault-modal-input">
            </div>

            <div class="vault-modal-field vault-modal-field--mb24">
                <label class="vault-modal-label">Password</label>
                <div class="vault-pw-wrapper">
                    <input type="password" id="manualPassword" placeholder="Enter your password" class="vault-modal-input vault-modal-input--pw">
                    <button id="btnPwToggle" type="button" aria-label="Show/hide password" class="vault-pw-toggle">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                        </svg>
                    </button>
                </div>
            </div>

            <div class="vault-modal-field vault-modal-field--mb24">
                <label class="vault-modal-label">Category</label>
                <div class="custom-select-wrapper">
                    <input type="hidden" id="manualKategorie" value="allgemein">
                    <button type="button" class="custom-select-btn">
                        <span class="cs-text">General</span>
                        <span class="material-symbols-outlined cs-arrow">expand_more</span>
                    </button>
                    <ul class="custom-select-list">
                        <li data-value="allgemein" class="cs-active">General</li>
                        <li data-value="banking">Banking</li>
                        <li data-value="email">E-Mail</li>
                        <li data-value="sozial">Social Media</li>
                        <li data-value="shopping">Shopping</li>
                        <li data-value="arbeit">Work</li>
                        <li data-value="gaming">Gaming</li>
                        <li data-value="sonstiges">Other…</li>
                    </ul>
                </div>
                <input type="text" id="manualKategorie-custom" placeholder="Enter custom category…">
            </div>

            <button id="btnSaveManual" class="vault-modal-save-btn">
                Save
            </button>
            <button id="btnCancelManual" class="vault-modal-cancel-btn">
                Cancel
            </button>
        </div>
    </div>
    <div id="footer"></div>
    <script type="module" src="/js/tresor.js?v=11"></script>
    <script src="/js/navbar-loader.js"></script>
    <script src="/js/custom-select.js"></script>
  </body>
</html>
