<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Password Generator – SafeNet Security</title>
    <meta name="description" content="Generate strong, random passwords with the SafeNet Password Generator. Choose length, special characters and complexity." />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Password Generator – SafeNet Security" />
    <meta property="og:description" content="Generate strong, random passwords with the SafeNet Password Generator. Choose length, special characters and complexity." />
    <meta property="og:image" content="https://safe-net-umber.vercel.app/images/SafeNet-Security-Logo/Withbg/ShieldWhiteName.png" />
    <meta property="og:url" content="https://safe-net-umber.vercel.app/en/pages/generator.html" />
    <link rel="stylesheet" href="/css/navbar.css" />
    <link rel="stylesheet" href="/css/style.css" />
    <link rel="stylesheet" href="/css/shared.css" />
    <link rel="stylesheet" href="/css/infobox.css" />
    <link rel="stylesheet" href="/css/hero.css" />
    <link rel="stylesheet" href="/css/footer.css" />
    <link rel="stylesheet" href="/css/generator.css" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="icon" type="image/png" href="/images/SafeNet-Security-Logo/Withoutbg/SafeNet Security 48 x 48 px.png">
    <script type="module" src="/js/auth.js?v=5"></script>
  </head>
  <body>
    <div id="navbar"></div>

    <div class="password-container">
        <h1>Password Generator</h1>
        
        <div class="display-box">
            <input type="text" id="password-output" readonly placeholder="Click Generate">
            <button id="copy-btn" title="Copy" aria-label="Copy password">
                <span class="material-symbols-outlined">content_copy</span>
            </button>
        </div>

        <div class="settings">
            <label>Length: <span id="length-val">16</span></label>
            <input type="range" id="length-slider" min="8" max="50" value="16">

            <div class="checkbox-grid">
                <label class="custom-check">
                    <input type="checkbox" id="include-lowercase" checked>
                    <span class="check-label">abc</span>
                </label>
                <label class="custom-check">
                    <input type="checkbox" id="include-uppercase" checked>
                    <span class="check-label">ABC</span>
                </label>
                <label class="custom-check">
                    <input type="checkbox" id="include-numbers" checked>
                    <span class="check-label">123</span>
                </label>
                <label class="custom-check">
                    <input type="checkbox" id="include-symbols" checked>
                    <span class="check-label">#$&</span>
                </label>
            </div>
        </div>

        <div class="settings" style="margin-top: 20px;">
            <label for="password-label">Label for the password:</label>
            <div class="input-group-row">
                <input type="text" id="password-label" placeholder="e.g. Instagram, Google, Bank">
                <div class="custom-select-wrapper" style="flex-shrink:1;">
                    <input type="hidden" id="generator-kategorie" value="allgemein">
                    <button type="button" class="custom-select-btn">
                        <span class="cs-text">General</span>
                        <span class="material-symbols-outlined cs-arrow">expand_more</span>
                    </button>
                    <ul class="custom-select-list">
                        <li data-value="allgemein" class="cs-active">General</li>
                        <li data-value="banking">Banking</li>
                        <li data-value="email">E-Mail</li>
                        <li data-value="sozial">Social Media</li>
                        <li data-value="shopping">Shopping</li>
                        <li data-value="arbeit">Work</li>
                        <li data-value="gaming">Gaming</li>
                        <li data-value="sonstiges">Other&hellip;</li>
                    </ul>
                </div>
                <button class="main-btn" onclick="transferToVault()" style="width: auto; margin-top: 0; white-space: nowrap; display: flex; align-items: center; gap: 5px; padding: 0 15px;">
                    <span class="material-symbols-outlined" style="font-size: 20px;">shield</span> Save
                </button>
            </div>
            <input type="text" id="generator-kategorie-custom" placeholder="Enter custom category&hellip;" style="display:none;width:100%;padding:12px 14px;background:#0f172a;border:1px solid rgba(59,130,246,0.25);border-radius:8px;color:white;font-size:15px;font-family:Inter,sans-serif;box-sizing:border-box;outline:none;margin-top:8px;">
        </div>

        <button id="generate-btn" class="main-btn">Generate secure password</button>
    </div>

    <script>
    const outputEl = document.getElementById('password-output');
    const lengthEl = document.getElementById('length-slider');
    const lengthVal = document.getElementById('length-val');

    const lowerEl = document.getElementById('include-lowercase');
    const upperEl = document.getElementById('include-uppercase');
    const numberEl = document.getElementById('include-numbers');
    const symbolEl = document.getElementById('include-symbols');

    const generateBtn = document.getElementById('generate-btn');

    lengthEl.addEventListener('input', () => {
      lengthVal.innerText = lengthEl.value;
    });

    const charSets = {
      lower: "abcdefghijklmnopqrstuvwxyz",
      upper: "ABCDEFGHIJKLMNOPQRSTUVWXYZ",
      number: "0123456789",
      symbol: "!@#$%^&*()_+~`|}{[]:;?><,./-="
    };

    const checkboxes = [lowerEl, upperEl, numberEl, symbolEl];
    checkboxes.forEach(cb => {
      cb.addEventListener("change", () => {
        const checkedCount = checkboxes.filter(c => c.checked).length;
        if (checkedCount === 0) {
          cb.checked = true;
          alert("At least one option must be active!");
        }
      });
    });

    function getRandomChar(str) {
      const array = new Uint32Array(1);
      window.crypto.getRandomValues(array);
      return str[array[0] % str.length];
    }

    function generatePassword() {
      const length = parseInt(lengthEl.value);
      let allowedChars = "";
      let passwordArray = [];

      if (lowerEl.checked) {
        allowedChars += charSets.lower;
        passwordArray.push(getRandomChar(charSets.lower));
      }
      if (upperEl.checked) {
        allowedChars += charSets.upper;
        passwordArray.push(getRandomChar(charSets.upper));
      }
      if (numberEl.checked) {
        allowedChars += charSets.number;
        passwordArray.push(getRandomChar(charSets.number));
      }
      if (symbolEl.checked) {
        allowedChars += charSets.symbol;
        passwordArray.push(getRandomChar(charSets.symbol));
      }

      const remainingLength = length - passwordArray.length;
      for (let i = 0; i < remainingLength; i++) {
        passwordArray.push(getRandomChar(allowedChars));
      }

      for (let i = passwordArray.length - 1; i > 0; i--) {
        const j = window.crypto.getRandomValues(new Uint32Array(1))[0] % (i + 1);
        [passwordArray[i], passwordArray[j]] = [passwordArray[j], passwordArray[i]];
      }

      outputEl.value = passwordArray.join('');
    }

    generateBtn.addEventListener('click', generatePassword);

    document.getElementById('copy-btn').addEventListener('click', () => {
      if (!outputEl.value) return;
      navigator.clipboard.writeText(outputEl.value);
      alert("Copied!");
    });

    // Custom Select
    (function initCustomSelects() {
      document.querySelectorAll('.custom-select-wrapper').forEach(wrapper => {
        const btn = wrapper.querySelector('.custom-select-btn');
        const list = wrapper.querySelector('.custom-select-list');
        const hidden = wrapper.querySelector('input[type="hidden"]');
        const textEl = wrapper.querySelector('.cs-text');
        btn.addEventListener('click', e => {
          e.stopPropagation();
          document.querySelectorAll('.custom-select-wrapper.open').forEach(w => { if (w !== wrapper) w.classList.remove('open'); });
          wrapper.classList.toggle('open');
        });
        list.querySelectorAll('li').forEach(li => {
          li.addEventListener('click', () => {
            hidden.value = li.dataset.value;
            textEl.textContent = li.textContent;
            list.querySelectorAll('li').forEach(l => l.classList.remove('cs-active'));
            li.classList.add('cs-active');
            wrapper.classList.remove('open');
            const ci = document.getElementById(hidden.id + '-custom');
            if (ci) { ci.style.display = li.dataset.value === 'sonstiges' ? 'block' : 'none'; if (li.dataset.value === 'sonstiges') ci.focus(); }
          });
        });
      });
      document.addEventListener('click', () => { document.querySelectorAll('.custom-select-wrapper.open').forEach(w => w.classList.remove('open')); });
    })();
    </script>

    <div id="footer"></div>
    <script>
      fetch("/en/partials/footer.html").then(res => res.text()).then(data => { document.getElementById("footer").innerHTML = data; });
      fetch("/en/partials/navbar.html").then(res => res.text()).then(data => {
          document.getElementById("navbar").innerHTML = data;
          const toggle = document.querySelector(".menu-toggle");
          const navLinks = document.querySelector(".nav-links");
          const dropdownLink = document.querySelector(".dropdown-link");
          const dropdown = document.querySelector(".dropdown");
          toggle.addEventListener("click", () => { navLinks.classList.toggle("active"); });
          dropdownLink.addEventListener("click", (e) => {
            if (window.innerWidth <= 768) {
              e.preventDefault();
              dropdown.classList.toggle("open");
            }
          });
      });
    </script>
    <script type="module" src="/js/tresor.js?v=9"></script>
  </body>
</html>
