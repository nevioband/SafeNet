<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tutorials – SafeNet Security</title>
    <meta name="description" content="Schritt-für-Schritt-Tutorials zu Passwort-Sicherheit, Phishing-Erkennung, 2FA und mehr." />
    <link rel="canonical" href="https://safenet-security.ch/de/pages/tutorials.html" />
    <link rel="alternate" hreflang="de" href="https://safenet-security.ch/de/pages/tutorials.html" />
    <link rel="alternate" hreflang="en" href="https://safenet-security.ch/en/pages/tutorials.html" />
    <link rel="icon" type="image/png" href="/images/SafeNet-Security-Logo/Withoutbg/SafeNet Security 48 x 48 px.png" />
    <link rel="stylesheet" href="/css/navbar.css" />
    <link rel="stylesheet" href="/css/style.css" />
    <link rel="stylesheet" href="/css/shared.css" />
    <link rel="stylesheet" href="/css/footer.css" />
    <link rel="stylesheet" href="/css/tutorials.css" />
    <script type="module" src="/js/auth.js?v=8"></script>
  </head>
  <body>
    <div id="navbar"></div>

    <main class="tutorials-main">
      <h1>Tutorials</h1>
      <p class="tutorials-subtitle">Lerne Schritt für Schritt, wie du dich online schützt.</p>

      <div class="tutorials-list" id="tutorials-list">

        <!-- Tutorial 1 -->
        <div class="tutorial-card" data-id="1">
          <button class="tutorial-header" aria-expanded="false">
            <div class="tutorial-header-left">
              <span class="tutorial-icon">🔑</span>
              <div class="tutorial-title-wrap">
                <span class="tutorial-title">Sicheres Passwort erstellen</span>
                <div class="tutorial-meta">
                  <span class="tutorial-badge badge-easy">Einfach</span>
                  <span class="tutorial-progress-text" id="prog-text-1">0 / 5</span>
                </div>
              </div>
            </div>
            <div class="tutorial-header-right">
              <div class="tutorial-progress-bar-track"><div class="tutorial-progress-bar-fill" id="prog-bar-1"></div></div>
              <span class="tutorial-chevron">▾</span>
            </div>
          </button>
          <div class="tutorial-body" id="body-1">
            <ol class="tutorial-steps">
              <li class="tutorial-step">
                <input type="checkbox" class="step-cb" id="t1s0" data-tut="1" data-step="0" />
                <span class="step-num">1</span>
                <label for="t1s0" class="step-text">Wähle mindestens <strong>12 Zeichen</strong> – je länger, desto besser.</label>
              </li>
              <li class="tutorial-step">
                <input type="checkbox" class="step-cb" id="t1s1" data-tut="1" data-step="1" />
                <span class="step-num">2</span>
                <label for="t1s1" class="step-text">Kombiniere <strong>Gross- und Kleinbuchstaben</strong>, Zahlen und Sonderzeichen (z.B. @, #, !).</label>
              </li>
              <li class="tutorial-step">
                <input type="checkbox" class="step-cb" id="t1s2" data-tut="1" data-step="2" />
                <span class="step-num">3</span>
                <label for="t1s2" class="step-text">Vermeide <strong>Wörterbuchwörter</strong>, Namen oder Geburtsdaten. <a href="/de/pages/wörterbuchangriff.html">Was ist ein Wörterbuchangriff? →</a></label>
              </li>
              <li class="tutorial-step">
                <input type="checkbox" class="step-cb" id="t1s3" data-tut="1" data-step="3" />
                <span class="step-num">4</span>
                <label for="t1s3" class="step-text">Teste dein Passwort im <a href="/de/pages/analysator.html">Analysator</a> – Ziel: grüner Score.</label>
              </li>
              <li class="tutorial-step">
                <input type="checkbox" class="step-cb" id="t1s4" data-tut="1" data-step="4" />
                <span class="step-num">5</span>
                <label for="t1s4" class="step-text">Nutze den <a href="/de/pages/generator.html">Passwort-Generator</a>, wenn du dir schwertust.</label>
              </li>
            </ol>
            <button class="reset-btn" data-tut="1">Fortschritt zurücksetzen</button>
          </div>
        </div>

        <!-- Tutorial 2 -->
        <div class="tutorial-card" data-id="2">
          <button class="tutorial-header" aria-expanded="false">
            <div class="tutorial-header-left">
              <span class="tutorial-icon">🎣</span>
              <div class="tutorial-title-wrap">
                <span class="tutorial-title">Phishing erkennen</span>
                <div class="tutorial-meta">
                  <span class="tutorial-badge badge-easy">Einfach</span>
                  <span class="tutorial-progress-text" id="prog-text-2">0 / 5</span>
                </div>
              </div>
            </div>
            <div class="tutorial-header-right">
              <div class="tutorial-progress-bar-track"><div class="tutorial-progress-bar-fill" id="prog-bar-2"></div></div>
              <span class="tutorial-chevron">▾</span>
            </div>
          </button>
          <div class="tutorial-body" id="body-2">
            <ol class="tutorial-steps">
              <li class="tutorial-step">
                <input type="checkbox" class="step-cb" id="t2s0" data-tut="2" data-step="0" />
                <span class="step-num">1</span>
                <label for="t2s0" class="step-text">Überprüfe immer die <strong>Absender-Adresse</strong> – nicht nur den Anzeigenamen. <a href="/de/pages/phishing.html">Phishing-Beispiele →</a></label>
              </li>
              <li class="tutorial-step">
                <input type="checkbox" class="step-cb" id="t2s1" data-tut="2" data-step="1" />
                <span class="step-num">2</span>
                <label for="t2s1" class="step-text">Bewege die Maus über Links, bevor du klickst – prüfe die <strong>URL-Vorschau</strong>. <a href="/de/pages/phishing.html">Mehr zu Phishing →</a></label>
              </li>
              <li class="tutorial-step">
                <input type="checkbox" class="step-cb" id="t2s2" data-tut="2" data-step="2" />
                <span class="step-num">3</span>
                <label for="t2s2" class="step-text">Sei misstrauisch bei <strong>Dringlichkeit</strong> («Sofort handeln!») oder unerwarteten Anhängen. <a href="/de/pages/socialengineering.html">Social Engineering →</a></label>
              </li>
              <li class="tutorial-step">
                <input type="checkbox" class="step-cb" id="t2s3" data-tut="2" data-step="3" />
                <span class="step-num">4</span>
                <label for="t2s3" class="step-text">Navigiere direkt zur echten Website statt einem Link in der E-Mail zu folgen. <a href="/de/pages/phishing.html">Phishing erkennen →</a></label>
              </li>
              <li class="tutorial-step">
                <input type="checkbox" class="step-cb" id="t2s4" data-tut="2" data-step="4" />
                <span class="step-num">5</span>
                <label for="t2s4" class="step-text">Lese unsere <a href="/de/pages/phishing.html">Phishing-Erklärungsseite</a> für weitere Beispiele.</label>
              </li>
            </ol>
            <button class="reset-btn" data-tut="2">Fortschritt zurücksetzen</button>
          </div>
        </div>

        <!-- Tutorial 3 -->
        <div class="tutorial-card" data-id="3">
          <button class="tutorial-header" aria-expanded="false">
            <div class="tutorial-header-left">
              <span class="tutorial-icon">🔐</span>
              <div class="tutorial-title-wrap">
                <span class="tutorial-title">Zwei-Faktor-Authentifizierung einrichten</span>
                <div class="tutorial-meta">
                  <span class="tutorial-badge badge-medium">Mittel</span>
                  <span class="tutorial-progress-text" id="prog-text-3">0 / 5</span>
                </div>
              </div>
            </div>
            <div class="tutorial-header-right">
              <div class="tutorial-progress-bar-track"><div class="tutorial-progress-bar-fill" id="prog-bar-3"></div></div>
              <span class="tutorial-chevron">▾</span>
            </div>
          </button>
          <div class="tutorial-body" id="body-3">
            <ol class="tutorial-steps">
              <li class="tutorial-step">
                <input type="checkbox" class="step-cb" id="t3s0" data-tut="3" data-step="0" />
                <span class="step-num">1</span>
                <label for="t3s0" class="step-text">Lade eine Authenticator-App herunter (z.B. <strong>Google Authenticator</strong> oder <strong>Authy</strong>). <a href="/de/pages/2fa.html">Was ist 2FA? →</a></label>
              </li>
              <li class="tutorial-step">
                <input type="checkbox" class="step-cb" id="t3s1" data-tut="3" data-step="1" />
                <span class="step-num">2</span>
                <label for="t3s1" class="step-text">Öffne die Sicherheitseinstellungen deines Kontos (E-Mail, soziale Medien usw.). <a href="/de/pages/einstellungen.html">SafeNet Einstellungen →</a></label>
              </li>
              <li class="tutorial-step">
                <input type="checkbox" class="step-cb" id="t3s2" data-tut="3" data-step="2" />
                <span class="step-num">3</span>
                <label for="t3s2" class="step-text">Scanne den <strong>QR-Code</strong> mit der App oder gib den Schlüssel manuell ein.</label>
              </li>
              <li class="tutorial-step">
                <input type="checkbox" class="step-cb" id="t3s3" data-tut="3" data-step="3" />
                <span class="step-num">4</span>
                <label for="t3s3" class="step-text">Gib den 6-stelligen Bestätigungscode ein und aktiviere 2FA.</label>
              </li>
              <li class="tutorial-step">
                <input type="checkbox" class="step-cb" id="t3s4" data-tut="3" data-step="4" />
                <span class="step-num">5</span>
                <label for="t3s4" class="step-text">Speichere die <strong>Backup-Codes</strong> sicher offline (z.B. im Tresor). <a href="/de/pages/tresor.html">Zum Tresor →</a></label>
              </li>
            </ol>
            <button class="reset-btn" data-tut="3">Fortschritt zurücksetzen</button>
          </div>
        </div>

        <!-- Tutorial 4 -->
        <div class="tutorial-card" data-id="4">
          <button class="tutorial-header" aria-expanded="false">
            <div class="tutorial-header-left">
              <span class="tutorial-icon">🗝️</span>
              <div class="tutorial-title-wrap">
                <span class="tutorial-title">Passwort-Manager richtig nutzen</span>
                <div class="tutorial-meta">
                  <span class="tutorial-badge badge-medium">Mittel</span>
                  <span class="tutorial-progress-text" id="prog-text-4">0 / 5</span>
                </div>
              </div>
            </div>
            <div class="tutorial-header-right">
              <div class="tutorial-progress-bar-track"><div class="tutorial-progress-bar-fill" id="prog-bar-4"></div></div>
              <span class="tutorial-chevron">▾</span>
            </div>
          </button>
          <div class="tutorial-body" id="body-4">
            <ol class="tutorial-steps">
              <li class="tutorial-step">
                <input type="checkbox" class="step-cb" id="t4s0" data-tut="4" data-step="0" />
                <span class="step-num">1</span>
                <label for="t4s0" class="step-text">Melde dich bei SafeNet Security an und öffne den <a href="/de/pages/tresor.html">Tresor</a>.</label>
              </li>
              <li class="tutorial-step">
                <input type="checkbox" class="step-cb" id="t4s1" data-tut="4" data-step="1" />
                <span class="step-num">2</span>
                <label for="t4s1" class="step-text">Füge jedes deiner bestehenden Passwörter mit <strong>Bezeichnung und Kategorie</strong> ein. <a href="/de/pages/tresor.html">Tresor öffnen →</a></label>
              </li>
              <li class="tutorial-step">
                <input type="checkbox" class="step-cb" id="t4s2" data-tut="4" data-step="2" />
                <span class="step-num">3</span>
                <label for="t4s2" class="step-text">Ersetze schwache Passwörter durch generierte – nutze dazu den <a href="/de/pages/generator.html">Generator</a>.</label>
              </li>
              <li class="tutorial-step">
                <input type="checkbox" class="step-cb" id="t4s3" data-tut="4" data-step="3" />
                <span class="step-num">4</span>
                <label for="t4s3" class="step-text">Prüfe regelmässig die <a href="/de/pages/meine-stats.html">Sicherheitsübersicht</a> auf Schwachstellen.</label>
              </li>
              <li class="tutorial-step">
                <input type="checkbox" class="step-cb" id="t4s4" data-tut="4" data-step="4" />
                <span class="step-num">5</span>
                <label for="t4s4" class="step-text">Ändere Passwörter nach Datenschutzverletzungen sofort und aktualisiere den Eintrag. <a href="/de/pages/news.html">Aktuelle Sicherheitslücken →</a></label>
              </li>
            </ol>
            <button class="reset-btn" data-tut="4">Fortschritt zurücksetzen</button>
          </div>
        </div>

        <!-- Tutorial 5 -->
        <div class="tutorial-card" data-id="5">
          <button class="tutorial-header" aria-expanded="false">
            <div class="tutorial-header-left">
              <span class="tutorial-icon">🚨</span>
              <div class="tutorial-title-wrap">
                <span class="tutorial-title">Nach einem Hack – Was tun?</span>
                <div class="tutorial-meta">
                  <span class="tutorial-badge badge-hard">Schwer</span>
                  <span class="tutorial-progress-text" id="prog-text-5">0 / 5</span>
                </div>
              </div>
            </div>
            <div class="tutorial-header-right">
              <div class="tutorial-progress-bar-track"><div class="tutorial-progress-bar-fill" id="prog-bar-5"></div></div>
              <span class="tutorial-chevron">▾</span>
            </div>
          </button>
          <div class="tutorial-body" id="body-5">
            <ol class="tutorial-steps">
              <li class="tutorial-step">
                <input type="checkbox" class="step-cb" id="t5s0" data-tut="5" data-step="0" />
                <span class="step-num">1</span>
                <label for="t5s0" class="step-text"><strong>Sofort Passwort ändern</strong> – auf dem betroffenen Konto und überall, wo du dasselbe Passwort verwendet hast. <a href="/de/pages/generator.html">Neues Passwort generieren →</a></label>
              </li>
              <li class="tutorial-step">
                <input type="checkbox" class="step-cb" id="t5s1" data-tut="5" data-step="1" />
                <span class="step-num">2</span>
                <label for="t5s1" class="step-text"><strong>Alle aktiven Sitzungen beenden</strong> – in den Kontoeinstellungen nach «Geräte» oder «Sitzungen» suchen.</label>
              </li>
              <li class="tutorial-step">
                <input type="checkbox" class="step-cb" id="t5s2" data-tut="5" data-step="2" />
                <span class="step-num">3</span>
                <label for="t5s2" class="step-text"><strong>2FA aktivieren</strong>, falls noch nicht geschehen – oder bestehende 2FA-Codes zurücksetzen. <a href="/de/pages/2fa.html">2FA-Anleitung →</a></label>
              </li>
              <li class="tutorial-step">
                <input type="checkbox" class="step-cb" id="t5s3" data-tut="5" data-step="3" />
                <span class="step-num">4</span>
                <label for="t5s3" class="step-text">Überprüfe <strong>verknüpfte Apps</strong> und entferne unbekannte Drittanbieter-Zugänge. <a href="/de/pages/einstellungen.html">SafeNet Einstellungen →</a></label>
              </li>
              <li class="tutorial-step">
                <input type="checkbox" class="step-cb" id="t5s4" data-tut="5" data-step="4" />
                <span class="step-num">5</span>
                <label for="t5s4" class="step-text">Informiere Betroffene (z.B. Kontakte), falls dein Konto für <strong>Spam oder Betrug</strong> missbraucht wurde.</label>
              </li>
            </ol>
            <button class="reset-btn" data-tut="5">Fortschritt zurücksetzen</button>
          </div>
        </div>

      </div><!-- /tutorials-list -->
    </main>

    <div id="footer"></div>

    <script>
      // ── Accordion + Checkbox + Fortschritt ────────────────────────
      const STEPS = 5;

      function lsKey(tut, step) { return `tut_${tut}_${step}`; }

      function countDone(tutId) {
        let n = 0;
        for (let i = 0; i < STEPS; i++) if (localStorage.getItem(lsKey(tutId, i)) === '1') n++;
        return n;
      }

      function updateProgress(tutId) {
        const done = countDone(tutId);
        const pct  = Math.round(done / STEPS * 100);
        const bar  = document.getElementById(`prog-bar-${tutId}`);
        const txt  = document.getElementById(`prog-text-${tutId}`);
        if (bar) bar.style.width = pct + '%';
        if (txt) txt.textContent = `${done} / ${STEPS}`;
      }

      function restoreCheckboxes(tutId) {
        for (let i = 0; i < STEPS; i++) {
          const cb = document.getElementById(`t${tutId}s${i}`);
          if (!cb) continue;
          cb.checked = localStorage.getItem(lsKey(tutId, i)) === '1';
          const label = cb.nextElementSibling?.nextElementSibling;
          if (label) label.classList.toggle('checked', cb.checked);
        }
        updateProgress(tutId);
      }

      document.querySelectorAll('.tutorial-header').forEach(btn => {
        btn.addEventListener('click', () => {
          const card    = btn.closest('.tutorial-card');
          const bodyId  = 'body-' + card.dataset.id;
          const body    = document.getElementById(bodyId);
          const chevron = btn.querySelector('.tutorial-chevron');
          const isOpen  = body.classList.contains('open');

          // Alle anderen schliessen
          document.querySelectorAll('.tutorial-body.open').forEach(b => {
            b.classList.remove('open');
            const otherBtn = b.previousElementSibling;
            if (otherBtn) {
              otherBtn.querySelector('.tutorial-chevron')?.classList.remove('open');
              otherBtn.setAttribute('aria-expanded', 'false');
            }
          });

          if (!isOpen) {
            body.classList.add('open');
            chevron?.classList.add('open');
            btn.setAttribute('aria-expanded', 'true');
          }
        });
      });

      document.querySelectorAll('.step-cb').forEach(cb => {
        cb.addEventListener('change', () => {
          const tutId = cb.dataset.tut;
          const step  = cb.dataset.step;
          localStorage.setItem(lsKey(tutId, step), cb.checked ? '1' : '0');
          const label = cb.nextElementSibling?.nextElementSibling;
          if (label) label.classList.toggle('checked', cb.checked);
          updateProgress(tutId);
        });
      });

      document.querySelectorAll('.reset-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const tutId = btn.dataset.tut;
          for (let i = 0; i < STEPS; i++) localStorage.removeItem(lsKey(tutId, i));
          restoreCheckboxes(tutId);
        });
      });

      // Fortschritt beim Laden wiederherstellen
      [1, 2, 3, 4, 5].forEach(id => restoreCheckboxes(id));

      // Navbar + Footer
      fetch('/de/partials/navbar.html').then(r => r.text()).then(d => {
        document.getElementById('navbar').innerHTML = d;
        const toggle   = document.querySelector('.menu-toggle');
        const navLinks = document.querySelector('.nav-links');
        const dropdowns = document.querySelectorAll('.dropdown');
        if (toggle) {
          toggle.addEventListener('click', () => {
            navLinks.classList.toggle('active');
            toggle.setAttribute('aria-expanded', navLinks.classList.contains('active'));
          });
        }
        dropdowns.forEach(dd => {
          const link = dd.querySelector('.dropdown-link');
          if (link) {
            link.addEventListener('click', e => {
              if (window.innerWidth <= 768) { e.preventDefault(); dd.classList.toggle('open'); }
            });
          }
        });
      });
      fetch('/de/partials/footer.html').then(r => r.text()).then(d => { document.getElementById('footer').innerHTML = d; });
    </script>
  </body>
</html>
