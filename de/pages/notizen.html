<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Notizen – SafeNet Security</title>
    <meta name="description" content="Erstelle strukturierte Notizen mit Ordnern, Tags und Checklisten direkt in SafeNet Security." />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Notizen – SafeNet Security" />
    <meta property="og:description" content="Erstelle strukturierte Notizen mit Ordnern, Tags und Checklisten direkt in SafeNet Security." />
    <meta property="og:image" content="https://safenet-security.ch/images/SafeNet-Security-Logo/Withbg/ShieldWhiteName.png" />
    <meta property="og:url" content="https://safenet-security.ch/de/pages/notizen.html" />
    <link rel="canonical" href="https://safenet-security.ch/de/pages/notizen.html" />
    <link rel="alternate" hreflang="de" href="https://safenet-security.ch/de/pages/notizen.html" />
    <link rel="alternate" hreflang="en" href="https://safenet-security.ch/en/pages/notizen.html" />
    <link rel="alternate" hreflang="x-default" href="https://safenet-security.ch/de/pages/notizen.html" />
    <link rel="icon" type="image/png" href="/images/SafeNet-Security-Logo/Withoutbg/SafeNet Security 48 x 48 px.png" />

    <link rel="stylesheet" href="/css/style.css" />
    <link rel="stylesheet" href="/css/shared.css" />
    <link rel="stylesheet" href="/css/navbar.css" />
    <link rel="stylesheet" href="/css/footer.css" />
    <link rel="stylesheet" href="/css/notizen.css" />

    <script type="module" src="/js/auth.js?v=8"></script>
    <script type="module" src="/js/notizen.js?v=12" defer></script>
  </head>
  <body>
    <div id="navbar"></div>
    <main class="notizen-main">
      <section class="notizen-seite">
        <header class="notizen-kopf">
          <h1>Notizen</h1>
          <p>Erstelle saubere, strukturierte Notizen mit Ordnern, Tags und Auto-Speichern.</p>
        </header>

        <div class="notizen-grid">
          <aside class="notizen-karte ordner-panel" data-mobile-panel>
            <div class="ordner-kopf">
              <div class="panel-titel">
                <h2>Ordner</h2>
              </div>
              <div class="ordner-aktionen">
                <button id="ordnerLoeschen" class="notiz-mini-btn warnung-mini" type="button" aria-label="Ordner löschen">−</button>
                <button id="ordnerAnlegen" class="notiz-mini-btn" type="button" aria-label="Ordner hinzufügen">+</button>
              </div>
            </div>
            <div class="mobile-panel-inhalt">
              <ul id="ordnerListe" class="ordner-liste"></ul>
            </div>
          </aside>

          <section class="notizen-karte liste-panel" data-mobile-panel>
            <div class="liste-kopf">
              <div class="panel-titel">
                <button id="zurueckZuOrdnern" class="mobile-back-btn" type="button" aria-label="Zurück zu Ordnern">←</button>
                <h2>Notizen</h2>
              </div>
            </div>
            <div class="mobile-panel-inhalt">
              <button id="notizAnlegen" class="notiz-haupt-btn" type="button">Neue Notiz</button>
              <input id="notizenSuche" class="notizen-suche" type="search" placeholder="Notizen durchsuchen..." />
              <div class="filter-reihe">
                <label class="editor-tag editor-checkbox" for="nurAngepinnt">
                  <input id="nurAngepinnt" type="checkbox" />
                  <span class="editor-checkbox-box" aria-hidden="true"></span>
                  <span class="editor-checkbox-text">Nur angepinnte</span>
                </label>
              </div>
              <div id="notizenListe" class="notizen-liste"></div>
            </div>
          </section>

          <section class="notizen-karte editor-panel" data-mobile-panel>
            <div class="editor-kopf">
              <div class="panel-titel">
                <button id="zurueckZuNotizen" class="mobile-back-btn" type="button" aria-label="Zurück zu Notizen">←</button>
                <h2>Editor</h2>
              </div>
              <div class="editor-aktionen">
                <button id="cloudSyncBtn" class="notiz-aktion-btn" type="button">Cloud-Sync</button>
                <button id="notizenImportBtn" class="notiz-aktion-btn" type="button">Import</button>
                <div class="export-dropdown" id="exportDropdown">
                  <button id="notizenExportBtn" class="notiz-aktion-btn export-toggle" type="button" aria-haspopup="listbox" aria-expanded="false">Export</button>
                  <div id="exportMenue" class="export-menue" role="listbox" aria-label="Exportformat auswählen" hidden>
                    <button class="export-option" type="button" role="option" data-export-format="txt">TXT</button>
                    <button class="export-option" type="button" role="option" data-export-format="html">HTML</button>
                    <button class="export-option" type="button" role="option" data-export-format="doc">Word</button>
                    <button class="export-option" type="button" role="option" data-export-format="pdf">PDF</button>
                  </div>
                </div>
                <button id="notizLoeschen" class="notiz-aktion-btn warnung" type="button">Löschen</button>
                <input id="notizenImportDatei" type="file" accept="application/json,.json,text/plain,.txt" hidden />
              </div>
            </div>
            <div class="mobile-panel-inhalt">
              <div class="editor-felder">
                <div class="editor-feld">
                  <label for="notizTitel">Titel</label>
                  <input id="notizTitel" type="text" maxlength="100" placeholder="Titel eingeben" />
                </div>

                <div class="editor-zeile">
                  <label class="editor-tag editor-checkbox" for="notizAngepinnt">
                    <input id="notizAngepinnt" type="checkbox" />
                    <span class="editor-checkbox-box" aria-hidden="true"></span>
                    <span class="editor-checkbox-text">Notiz anpinnen</span>
                  </label>
                  <div class="editor-werkzeuge">
                    <button id="textFett" class="notiz-aktion-btn" type="button">Fett</button>
                    <button id="textKursiv" class="notiz-aktion-btn" type="button">Kursiv</button>
                    <button id="textUnterstrichen" class="notiz-aktion-btn" type="button">Unterstrichen</button>
                    <div class="schriftgroesse-dropdown" id="schriftgroesseDropdown">
                      <button id="schriftgroesseToggle" class="notiz-aktion-btn schriftgroesse-toggle" type="button" aria-haspopup="listbox" aria-expanded="false" aria-label="Schriftgröße auswählen">
                        <span id="schriftgroesseLabel">Mittel</span>
                        <span class="schriftgroesse-pfeil" aria-hidden="true">▾</span>
                      </button>
                      <div id="schriftgroesseMenue" class="schriftgroesse-menue" role="listbox" aria-label="Schriftgröße Optionen" hidden>
                        <button class="schriftgroesse-option" type="button" role="option" data-groesse="12">Sehr klein</button>
                        <button class="schriftgroesse-option" type="button" role="option" data-groesse="14">Klein</button>
                        <button class="schriftgroesse-option aktiv" type="button" role="option" data-groesse="18" aria-selected="true">Mittel</button>
                        <button class="schriftgroesse-option" type="button" role="option" data-groesse="24">Gross</button>
                        <button class="schriftgroesse-option" type="button" role="option" data-groesse="32">Sehr gross</button>
                      </div>
                    </div>
                  </div>
                </div>

                <div class="editor-feld">
                  <label for="notizInhalt">Inhalt</label>
                  <div id="notizInhalt" class="notiz-editor" contenteditable="true" role="textbox" aria-label="Notizinhalt" aria-multiline="true" data-placeholder="Schreibe hier deine Notiz..."></div>
                </div>
              </div>
              <p id="cloudStatus" class="cloud-status">Cloud: wird geprüft ...</p>
              <p id="speicherStatus" class="speicher-status">Gerade eben</p>
            </div>
          </section>
        </div>
      </section>
    <div id="footer"></div>

    <script>
      fetch('/de/partials/navbar.html')
        .then((res) => res.text())
        .then((data) => {
          document.getElementById('navbar').innerHTML = data;
          const toggle = document.querySelector('.menu-toggle');
          const navLinks = document.querySelector('.nav-links');
          if (toggle && navLinks) {
            toggle.addEventListener('click', () => {
              navLinks.classList.toggle('active');
            });
          }
        });

      fetch('/de/partials/footer.html')
        .then((res) => res.text())
        .then((data) => {
          document.getElementById('footer').innerHTML = data;
        });
    </script>
  </body>
</html>
