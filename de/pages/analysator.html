<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Passwort-Analysator – SafeNet Security</title>
    <meta name="description" content="Überprüfe sofort, wie sicher dein Passwort ist. Der SafeNet Analysator erkennt Schwächen und gibt konkrete Verbesserungsvorschläge." />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Passwort-Analysator – SafeNet Security" />
    <meta property="og:description" content="Überprüfe sofort, wie sicher dein Passwort ist. Der SafeNet Analysator erkennt Schwächen und gibt konkrete Verbesserungsvorschläge." />
    <meta property="og:image" content="https://safenet-security.ch/images/SafeNet-Security-Logo/Withbg/ShieldWhiteName.png" />
    <meta property="og:url" content="https://safenet-security.ch/de/pages/analysator.html" />
    <link rel="canonical" href="https://safenet-security.ch/de/pages/analysator.html" />
    <link rel="alternate" hreflang="de" href="https://safenet-security.ch/de/pages/analysator.html" />
    <link rel="alternate" hreflang="en" href="https://safenet-security.ch/en/pages/analysator.html" />
    <link rel="alternate" hreflang="x-default" href="https://safenet-security.ch/de/pages/analysator.html" />

    <!-- Globale Styles (Navbar, Basis, Infoboxen, Hero, Footer) -->
    <link rel="stylesheet" href="/css/navbar.css" />
    <link rel="stylesheet" href="/css/style.css" />
    <link rel="stylesheet" href="/css/infobox.css" />
    <link rel="stylesheet" href="/css/hero.css" />
    <link rel="stylesheet" href="/css/footer.css" />

    <!-- Seitenspezifische Styles -->
    <link rel="stylesheet" href="/css/shared.css" />
    <link rel="stylesheet" href="/css/analyse.css" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/images/SafeNet-Security-Logo/Withoutbg/SafeNet Security 48 x 48 px.png">

    <!-- Auth: Navbar-Zustand & Session-Handling -->
    <script type="module" src="/js/auth.js?v=8"></script>
  </head>
  <body>
    <!-- Navbar (wird per JS aus partials/navbar.html geladen) -->
    <div id="navbar"></div>

    <!-- ─── Passwort-Analysator ─────────────────────────────────────── -->
    <section class="analyser-section">
      <div class="analyser-box">
        <h1>Passwort Analyse</h1>
        <p>Gib ein Passwort ein und überprüfe seine Sicherheit in Echtzeit.</p>

        <div class="pw-input-wrap">
          <input type="password" id="passwordInput" placeholder="Passwort eingeben" autocomplete="off" />
          <button id="pw-toggle" class="pw-eye" aria-label="Passwort anzeigen" type="button">
            <svg id="pw-eye-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>

        <div class="pw-bar-wrap">
          <div id="pw-bar" class="pw-bar"></div>
        </div>
        <div id="result"></div>

        <div id="pw-badges" class="pw-badges"></div>
        <div id="pw-cracktime" class="pw-cracktime"></div>

        <ul id="suggestions"></ul>

        <!-- Datenleck-Prüfung (Have I Been Pwned, k-Anonymity) -->
        <div class="hibp-section">
          <button id="hibpBtn" class="main-btn" type="button">Auf Datenlecks prüfen</button>
          <p class="hibp-info">Prüf anonym, ob dein Passwort in bekannten Datenlecks auftaucht. Dein Passwort verlässt dabei <strong>nie</strong> deinen Browser.</p>
          <div id="hibpResult"></div>
        </div>
      </div>
    </section>

    <!-- Footer (wird per JS aus partials/footer.html geladen) -->
    <div id="footer"></div>

    <!-- Analyse-Logik: Stärkeberechnung, Badges, Knackzeit -->
    <script src="/js/analyse.js"></script>

    <script>
      // ─── Navbar laden & Mobile-Menü initialisieren ───
      fetch("/de/partials/navbar.html")
        .then((res) => res.text())
        .then((data) => {
          document.getElementById("navbar").innerHTML = data;

          const toggle = document.querySelector(".menu-toggle");
          const navLinks = document.querySelector(".nav-links");
          const dropdown = document.querySelector(".dropdown");
          const dropdownLink = document.querySelector(".dropdown-link");

          if (toggle) {
            toggle.addEventListener("click", () => {
              navLinks.classList.toggle("active");
              if (!navLinks.classList.contains("active")) {
                dropdown.classList.remove("open");
              }
            });
          }

          if (dropdownLink) {
            dropdownLink.addEventListener("click", (e) => {
              if (window.innerWidth <= 768) {
                if (!dropdown.classList.contains("open")) {
                  e.preventDefault();
                  dropdown.classList.add("open");
                }
              }
            });
          }
        });

      // ─── Footer laden ───
      fetch("/de/partials/footer.html")
        .then(res => res.text())
        .then(data => {
          document.getElementById("footer").innerHTML = data;
        });
    </script>
  </body>
</html>
