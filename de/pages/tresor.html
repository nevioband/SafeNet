<!doctype html>
<html lang="de">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Passwort-Tresor – SafeNet Security</title>
    <meta name="description" content="Speichere deine Passwörter verschlüsselt im SafeNet Tresor. AES-256-Verschlüsselung direkt im Browser – sicher und privat." />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Passwort-Tresor – SafeNet Security" />
    <meta property="og:description" content="Speichere deine Passwörter verschlüsselt im SafeNet Tresor. AES-256-Verschlüsselung direkt im Browser – sicher und privat." />
    <meta property="og:image" content="https://safe-net-umber.vercel.app/images/SafeNet-Security-Logo/Withbg/ShieldWhiteName.png" />
    <meta property="og:url" content="https://safe-net-umber.vercel.app/de/pages/tresor.html" />
    <link rel="stylesheet" href="/css/navbar.css" />
    <link rel="stylesheet" href="/css/style.css" />
    <link rel="stylesheet" href="/css/shared.css" />
    <link rel="stylesheet" href="/css/footer.css" />
    <link rel="stylesheet" href="/css/generator.css" />
    <link rel="stylesheet" href="/css/tresor.css" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="icon" type="image/png" href="/images/SafeNet-Security-Logo/Withoutbg/SafeNet Security 48 x 48 px.png">
    <script type="module" src="/js/auth.js?v=5"></script>
</head>
<body>
    <div id="navbar"></div>

    <div class="password-container">
        <h1>Dein Tresor</h1>

        <!-- Suchfeld -->
        <div id="vaultSearchContainer" style="position:relative;margin-bottom:16px;display:none;">
            <span class="material-symbols-outlined" style="position:absolute;left:12px;top:50%;transform:translateY(-50%);color:#64748b;font-size:20px;pointer-events:none;">search</span>
            <input type="text" id="vaultSearch" placeholder="Passwort suchen…"
                oninput="window.filterVault(this.value)"
                style="width:100%;padding:11px 14px 11px 40px;background:#0f172a;border:1px solid rgba(59,130,246,0.2);border-radius:10px;color:white;font-size:15px;font-family:Inter,sans-serif;box-sizing:border-box;outline:none;">
        </div>
        
        <div id="saved-passwords-list" class="vault-list"></div>

        <div class="settings vault-buttons">
            <button class="main-btn vault-action-btn" onclick="document.getElementById('manualModal').style.display='flex'">
                <span class="material-symbols-outlined">lock</span> Passwort manuell speichern
            </button>

            <button class="main-btn-delete vault-action-btn" onclick="clearVault()">
                <span class="material-symbols-outlined">delete_sweep</span> Alle löschen
            </button>

            <!-- CSV Import -->
            <input type="file" id="csvFileInput" accept=".csv" style="display:none;" onchange="window.importCSV(this)">

            <a href="/de/pages/generator.html" style="text-decoration: none; width: 100%; display: block;">
                <button class="main-btn vault-action-btn">
                    <span class="material-symbols-outlined">add</span> Neues Passwort generieren
                </button>
            </a>

            <div class="vault-import-export">
                <button class="vault-icon-btn" onclick="document.getElementById('csvFileInput').click()">
                    <span class="material-symbols-outlined">upload_file</span> Importieren
                </button>
                <button class="vault-icon-btn" onclick="window.exportCSV()">
                    <span class="material-symbols-outlined">download</span> Exportieren
                </button>
            </div>
        </div>
    </div>

    <!-- Manuelles Passwort Modal -->
    <div id="manualModal" style="display:none;position:fixed;top:0;right:0;bottom:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);z-index:9999;align-items:center;justify-content:center;">
        <div style="background:#172441;border:1px solid rgba(59,130,246,0.2);border-radius:16px;padding:36px 32px;width:100%;max-width:400px;margin:20px;box-shadow:0 20px 60px rgba(0,0,0,0.4);">
            <h3 style="margin:0 0 20px;font-size:18px;background:linear-gradient(135deg,#3399ff,#66d9ff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;">Passwort manuell speichern</h3>

            <div style="display:flex;flex-direction:column;gap:6px;margin-bottom:16px;">
                <label style="font-size:14px;color:#cbd5e1;font-weight:500;">Name / Beschreibung</label>
                <input type="text" id="manualLabel" placeholder="z.B. Instagram, Google, Bank"
                    style="width:100%;padding:12px 14px;background:#0f172a;border:1px solid rgba(59,130,246,0.25);border-radius:8px;color:white;font-size:15px;font-family:Inter,sans-serif;box-sizing:border-box;outline:none;">
            </div>

            <div style="display:flex;flex-direction:column;gap:6px;margin-bottom:24px;">
                <label style="font-size:14px;color:#cbd5e1;font-weight:500;">Passwort</label>
                <div style="position:relative;display:flex;align-items:center;">
                    <input type="password" id="manualPassword" placeholder="Dein Passwort eingeben"
                        style="width:100%;padding:12px 42px 12px 14px;background:#0f172a;border:1px solid rgba(59,130,246,0.25);border-radius:8px;color:white;font-size:15px;font-family:Inter,sans-serif;box-sizing:border-box;outline:none;">
                    <button type="button" onclick="const i=document.getElementById('manualPassword');i.type=i.type==='password'?'text':'password'" 
                        style="position:absolute;right:12px;background:none;border:none;color:#64748b;cursor:pointer;padding:4px;display:flex;align-items:center;">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="18" height="18">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                        </svg>
                    </button>
                </div>
            </div>

            <div style="display:flex;flex-direction:column;gap:6px;margin-bottom:24px;">
                <label style="font-size:14px;color:#cbd5e1;font-weight:500;">Kategorie</label>
                <select id="manualKategorie" onchange="const ci=document.getElementById('manualKategorie-custom');ci.style.display=this.value==='sonstiges'?'block':'none';if(this.value==='sonstiges')ci.focus();" style="width:100%;padding:12px 14px;background:#0f172a;border:1px solid rgba(59,130,246,0.25);border-radius:8px;color:white;font-size:15px;font-family:Inter,sans-serif;box-sizing:border-box;outline:none;">
                    <option value="allgemein">Allgemein</option>
                    <option value="banking">Banking</option>
                    <option value="email">E-Mail</option>
                    <option value="sozial">Soziale Medien</option>
                    <option value="shopping">Shopping</option>
                    <option value="arbeit">Arbeit</option>
                    <option value="gaming">Gaming</option>
                    <option value="sonstiges">Sonstiges…</option>
                </select>
                <input type="text" id="manualKategorie-custom" placeholder="Eigene Kategorie eingeben…" style="display:none;width:100%;padding:12px 14px;background:#0f172a;border:1px solid rgba(59,130,246,0.25);border-radius:8px;color:white;font-size:15px;font-family:Inter,sans-serif;box-sizing:border-box;outline:none;margin-top:8px;">
            </div>

            <button onclick="window.saveManual()" style="width:100%;padding:13px;background:linear-gradient(135deg,#3399ff,#66d9ff);color:#0f172a;border:none;border-radius:8px;font-size:15px;font-weight:700;font-family:Inter,sans-serif;cursor:pointer;margin-bottom:10px;">
                Speichern
            </button>
            <button onclick="document.getElementById('manualModal').style.display='none'" 
                style="width:100%;padding:10px;background:transparent;border:1px solid rgba(59,130,246,0.25);border-radius:8px;color:#94a3b8;cursor:pointer;font-family:Inter,sans-serif;font-size:14px;">
                Abbrechen
            </button>
        </div>
    </div>

    <div id="footer"></div>

    <script>
        // Navbar & Footer laden
        fetch("/de/partials/navbar.html").then(res => res.text()).then(data => {
            document.getElementById("navbar").innerHTML = data;
            const toggle = document.querySelector(".menu-toggle");
            const navLinks = document.querySelector(".nav-links");
            if(toggle) toggle.addEventListener("click", () => { navLinks.classList.toggle("active"); });
        });
        fetch("/de/partials/footer.html").then(res => res.text()).then(data => {
            document.getElementById("footer").innerHTML = data;
        });
    </script>
    <script type="module" src="/js/tresor.js?v=9"></script>
</body>
</html>
