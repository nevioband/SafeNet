<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Impressum – SafeNet Security</title>
    <link rel="stylesheet" href="/css/navbar.css" />
    <link rel="stylesheet" href="/css/style.css" />
    <link rel="stylesheet" href="/css/shared.css" />
    <link rel="stylesheet" href="/css/infobox.css" />
    <link rel="stylesheet" href="/css/hero.css" />
    <link rel="stylesheet" href="/css/footer.css" />
    <link rel="stylesheet" href="/css/generator.css" />
    <link rel="stylesheet" href="/css/übersns.css" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0"
    />
    <link
      rel="icon"
      type="image/png"
      href="/images/SafeNet-Security-Logo/Withoutbg/SafeNet Security 48 x 48 px.png"
    />
    <script type="module" src="/js/auth.js?v=5"></script>
  </head>
  <body>
    <div id="navbar"></div>

    <div class="about-hero">
      <h1>Impressum</h1>
    </div>

    <section class="info-section">
      <div class="info-box">
        <p>
          Nevio Ryser <br />
          Lindenstrasse 7 <br />
          4912 Aarwangen <br />
          Schweiz

          <br /><br />
          E-Mail: nevio.ryser@band.com
          <br /><br />
          Verantwortlich für den Inhalt nach § 55 Abs. 2 RStV: Nevio Ryser,
          Anschrift wie oben.

          <br /><br />
          Weitere Hinweise finden Sie im Haftungsausschluss und in der
          Datenschutzerklärung.
        </p>
      </div>
    </section>

    <div id="footer"></div>
    <script>
      fetch("/de/partials/footer.html")
        .then((res) => res.text())
        .then((data) => {
          document.getElementById("footer").innerHTML = data;
        });
      fetch("/de/partials/navbar.html")
        .then((res) => res.text())
        .then((data) => {
          document.getElementById("navbar").innerHTML = data;
          const toggle = document.querySelector(".menu-toggle");
          const navLinks = document.querySelector(".nav-links");
          const dropdownLink = document.querySelector(".dropdown-link");
          const dropdown = document.querySelector(".dropdown");
          toggle.addEventListener("click", () => {
            navLinks.classList.toggle("active");
          });
          dropdownLink.addEventListener("click", (e) => {
            if (window.innerWidth <= 768) {
              e.preventDefault();
              dropdown.classList.toggle("open");
            }
          });
        });
    </script>
  </body>
</html>
