<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Passwort-Generator – SafeNet Security</title>
    <meta name="description" content="Generiere starke, zufällige Passwörter mit dem SafeNet Passwort-Generator. Wähle Länge, Sonderzeichen und Komplexität." />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Passwort-Generator – SafeNet Security" />
    <meta property="og:description" content="Generiere starke, zufällige Passwörter mit dem SafeNet Passwort-Generator. Wähle Länge, Sonderzeichen und Komplexität." />
    <meta property="og:image" content="https://safenet-security.ch/images/SafeNet-Security-Logo/Withbg/ShieldWhiteName.png" />
    <meta property="og:url" content="https://safenet-security.ch/de/pages/generator.html" />
    <link rel="canonical" href="https://safenet-security.ch/de/pages/generator.html" />
    <link rel="alternate" hreflang="de" href="https://safenet-security.ch/de/pages/generator.html" />
    <link rel="alternate" hreflang="en" href="https://safenet-security.ch/en/pages/generator.html" />
    <link rel="alternate" hreflang="x-default" href="https://safenet-security.ch/de/pages/generator.html" />
    <link rel="stylesheet" href="/css/navbar.css" />
    <link rel="stylesheet" href="/css/style.css" />
    <link rel="stylesheet" href="/css/shared.css" />
    <link rel="stylesheet" href="/css/infobox.css" />
    <link rel="stylesheet" href="/css/hero.css" />
    <link rel="stylesheet" href="/css/footer.css" />
    <link rel="stylesheet" href="/css/generator.css" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
    <link rel="icon" type="image/png" href="/images/SafeNet-Security-Logo/Withoutbg/SafeNet Security 48 x 48 px.png">
    <script type="module" src="/js/auth.js?v=8"></script>
  </head>
  <body>
    <div id="navbar"></div>

    <div class="password-container">
        <h1>Passwort Generator</h1>
        
        <div class="display-box">
            <input type="text" id="password-output" readonly placeholder="Klicke auf Generieren">
            <button id="copy-btn" title="Kopieren" aria-label="Passwort kopieren">
                <span class="material-symbols-outlined">content_copy</span>
            </button>
        </div>

        <div class="settings">
            <label>Länge: <span id="length-val">16</span></label>
            <input type="range" id="length-slider" min="8" max="50" value="16" aria-label="Passwortlänge">

            <div class="checkbox-grid">
                <label class="custom-check">
                    <input type="checkbox" id="include-lowercase" checked>
                    <span class="check-label">abc</span>
                </label>
                <label class="custom-check">
                    <input type="checkbox" id="include-uppercase" checked>
                    <span class="check-label">ABC</span>
                </label>
                <label class="custom-check">
                    <input type="checkbox" id="include-numbers" checked>
                    <span class="check-label">123</span>
                </label>
                <label class="custom-check">
                    <input type="checkbox" id="include-symbols" checked>
                    <span class="check-label">#$&</span>
                </label>
            </div>
        </div>

        <div class="settings settings-vault">
            <label for="password-label">Name für das Passwort:</label>
            <div class="input-group-row">
                <input type="text" id="password-label" placeholder="z.B. Instagram, Google, Bank">
                <div class="custom-select-wrapper custom-select-wrapper--shrink">
                    <input type="hidden" id="generator-kategorie" value="allgemein">
                    <button type="button" class="custom-select-btn">
                        <span class="cs-text">Allgemein</span>
                        <span class="material-symbols-outlined cs-arrow">expand_more</span>
                    </button>
                    <ul class="custom-select-list">
                        <li data-value="allgemein" class="cs-active">Allgemein</li>
                        <li data-value="banking">Banking</li>
                        <li data-value="email">E-Mail</li>
                        <li data-value="sozial">Soziale Medien</li>
                        <li data-value="shopping">Shopping</li>
                        <li data-value="arbeit">Arbeit</li>
                        <li data-value="gaming">Gaming</li>
                        <li data-value="sonstiges">Sonstiges…</li>
                    </ul>
                </div>
                <button class="main-btn" id="vault-save-btn">
                    <span class="material-symbols-outlined vault-save-icon">shield</span> Sichern
                </button>
            </div>
            <input type="text" id="generator-kategorie-custom" placeholder="Eigene Kategorie eingeben…">
        </div>

        <button id="generate-btn" class="main-btn">Sicheres Passwort erstellen</button>
    </div>
    <div id="footer"></div>
    <script src="/js/navbar-loader.js"></script>
    <script src="/js/custom-select.js"></script>
    <script type="module" src="/js/generator-de.js"></script>
  </body>
</html>
