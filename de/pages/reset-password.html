<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Neues Passwort – SafeNet Security</title>
    <meta
      name="description"
      content="Setze dein SafeNet Security Passwort zurück. Gib deine E-Mail ein und erhalte einen Link zum Zurücksetzen."
    />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Neues Passwort – SafeNet Security" />
    <meta
      property="og:description"
      content="Setze dein SafeNet Security Passwort zurück. Gib deine E-Mail ein und erhalte einen Link zum Zurücksetzen."
    />
    <meta
      property="og:image"
      content="https://safenet-security.ch/images/SafeNet-Security-Logo/Withbg/ShieldWhiteName.png"
    />
    <meta
      property="og:url"
      content="https://safenet-security.ch/de/pages/reset-password.html"
    />
    <link rel="stylesheet" href="/css/navbar.css" />
    <link rel="stylesheet" href="/css/style.css" />
    <link rel="stylesheet" href="/css/shared.css" />
    <link rel="stylesheet" href="/css/footer.css" />
    <link rel="stylesheet" href="/css/login.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />
    <link
      rel="icon"
      type="image/png"
      href="/images/SafeNet-Security-Logo/Withoutbg/SafeNet Security 48 x 48 px.png"
    />
    <script type="module" src="/js/auth.js?v=9"></script>
  </head>
  <body>
    <div id="navbar"></div>
    <h1 class="sr-only">Passwort zurücksetzen</h1>
    <main class="login-wrapper">
      <div class="login-card">
        <div class="login-icon">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
          >
            <defs>
              <linearGradient id="keyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#3399ff" />
                <stop offset="100%" stop-color="#66d9ff" />
              </linearGradient>
            </defs>
            <rect
              x="3"
              y="11"
              width="18"
              height="11"
              rx="2"
              ry="2"
              stroke="url(#keyGrad)"
              stroke-width="1.5"
              fill="url(#keyGrad)"
              fill-opacity="0.15"
            />
            <path
              d="M7 11V7a5 5 0 0 1 10 0v4"
              stroke="url(#keyGrad)"
              stroke-width="1.5"
              stroke-linecap="round"
              stroke-linejoin="round"
            />
          </svg>
        </div>

        <h2>Neues Passwort</h2>
        <p class="login-subtitle">Gib dein neues Passwort ein</p>

        <div id="errorBox" class="error-box hidden">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <circle cx="12" cy="12" r="10" />
            <line x1="12" y1="8" x2="12" y2="12" />
            <line x1="12" y1="16" x2="12.01" y2="16" />
          </svg>
          <span id="errorText">Fehler beim Zurücksetzen.</span>
        </div>

        <div id="invalidBox" class="error-box" style="display: none; text-align: center; justify-content: center; flex-direction: column; gap: 12px;">
          <p style="margin: 0; color: #ef4444;">Dieser Link ist ungültig oder abgelaufen.</p>
          <a href="login.html" style="color: #3399ff; text-decoration: none; font-size: 14px; font-weight: 600;">Zurück zum Login</a>
        </div>

       <div id="formBox" style="display: block;">
          <div class="form-group">
            <label for="newPass">Neues Passwort</label>
            <div class="input-wrapper">
              <svg
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
                <path d="M7 11V7a5 5 0 0 1 10 0v4" />
              </svg>
              <input
                type="password"
                id="newPass"
                placeholder="Neues Passwort (min. 6 Zeichen)"
                autocomplete="new-password"
              />
              <button
                class="password-toggle"
                type="button"
                id="togglePass"
                aria-label="Passwort anzeigen"
              >
                <svg
                  id="eyeIcon"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                  <circle cx="12" cy="12" r="3" />
                </svg>
              </button>
            </div>
          </div>

          <div class="form-group">
            <label for="confirmPass">Passwort bestätigen</label>
            <div class="input-wrapper">
              <svg
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
                <path d="M7 11V7a5 5 0 0 1 10 0v4" />
              </svg>
              <input
                type="password"
                id="confirmPass"
                placeholder="Passwort wiederholen"
                autocomplete="new-password"
              />
            </div>
          </div>

          <button class="login-btn" id="resetBtn">Passwort speichern</button>
        </div>

        <div id="successBox" style="display: none; text-align: center;">
          <div class="success-icon" style="margin-bottom: 16px; color: #10b981;">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="width: 48px; height: 48px; margin: 0 auto;">
              <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" />
              <polyline points="22 4 12 14.01 9 11.01" />
            </svg>
          </div>
          <p style="color: #e2e8f0; font-size: 16px; font-weight: 500; margin-bottom: 24px;">
            Passwort erfolgreich geändert!
          </p>
          <a href="login.html" class="login-btn" style="display: block; text-decoration: none; text-align: center; line-height: 1;">Zum Login</a>
        </div>
      </div>
    </main>

    <div id="footer"></div>
    <script src="/js/navbar-loader.js"></script>
<script src="/js/reset-password-de.js?v=2"></script>
  </body>
</html>
