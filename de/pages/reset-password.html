<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neues Passwort – SafeNet Security</title>    <meta name="description" content="Setze dein SafeNet Security Passwort zurück. Gib deine E-Mail ein und erhalte einen Link zum Zurücksetzen." />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Neues Passwort – SafeNet Security" />
    <meta property="og:description" content="Setze dein SafeNet Security Passwort zurück. Gib deine E-Mail ein und erhalte einen Link zum Zurücksetzen." />
    <meta property="og:image" content="https://safe-net-umber.vercel.app/images/SafeNet-Security-Logo/Withbg/ShieldWhiteName.png" />
    <meta property="og:url" content="https://safe-net-umber.vercel.app/de/pages/reset-password.html" />    <link rel="stylesheet" href="/css/navbar.css">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/shared.css">
    <link rel="stylesheet" href="/css/footer.css">
    <link rel="stylesheet" href="/css/login.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="/images/SafeNet-Security-Logo/Withoutbg/SafeNet Security 48 x 48 px.png">
</head>
<body>
    <div id="navbar"></div>

    <main class="login-wrapper">
        <div class="login-card">

            <div class="login-icon">
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <linearGradient id="keyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#3399ff"/>
                            <stop offset="100%" style="stop-color:#66d9ff"/>
                        </linearGradient>
                    </defs>
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2" stroke="url(#keyGrad)" stroke-width="1.5" fill="url(#keyGrad)" fill-opacity="0.15"/>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4" stroke="url(#keyGrad)" stroke-width="1.5" stroke-linecap="round"/>
                </svg>
            </div>

            <h2>Neues Passwort</h2>
            <p class="login-subtitle">Gib dein neues Passwort ein</p>

            <div id="errorBox" class="error-box hidden">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
                </svg>
                <span id="errorText">Fehler beim Zurücksetzen.</span>
            </div>

            <div id="invalidBox" style="display:none;background:rgba(239,68,68,0.12);border:1px solid rgba(239,68,68,0.4);border-radius:8px;color:#fca5a5;font-size:14px;padding:14px;text-align:center;margin-bottom:18px;">
                Dieser Link ist ungültig oder abgelaufen.<br>
                <a href="login.html" style="color:#3399ff;margin-top:8px;display:inline-block;">Zurück zum Login</a>
            </div>

            <div id="formBox">
                <div class="form-group">
                    <label for="newPass">Neues Passwort</label>
                    <div class="input-wrapper">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                        </svg>
                        <input type="password" id="newPass" placeholder="Neues Passwort (min. 6 Zeichen)" autocomplete="new-password">
                        <button class="password-toggle" type="button" id="togglePass" aria-label="Passwort anzeigen">
                            <svg id="eyeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                            </svg>
                        </button>
                    </div>
                </div>

                <div class="form-group">
                    <label for="confirmPass">Passwort bestätigen</label>
                    <div class="input-wrapper">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                        </svg>
                        <input type="password" id="confirmPass" placeholder="Passwort wiederholen" autocomplete="new-password">
                    </div>
                </div>

                <button class="login-btn" id="resetBtn">Passwort speichern</button>
            </div>

            <div id="successBox" style="display:none;text-align:center;">
                <div style="background:rgba(34,197,94,0.12);border:1px solid rgba(34,197,94,0.4);border-radius:8px;color:#86efac;font-size:14px;padding:14px;margin-bottom:20px;">
                    Passwort erfolgreich geändert!
                </div>
                <a href="login.html" class="login-btn" style="display:block;text-decoration:none;text-align:center;">Zum Login</a>
            </div>
        </div>
    </main>

    <div id="footer"></div>

    <script type="module">
        import { supabase } from '/js/supabase.js?v=3'

        function supabaseError(msg) {
            if (!msg) return 'Ein unbekannter Fehler ist aufgetreten.'
            const m = msg.toLowerCase()
            if (m.includes('same password') || m.includes('different from')) return 'Das neue Passwort muss anders als das alte sein.'
            if (m.includes('weak password') || m.includes('at least')) return 'Das Passwort ist zu schwach. Bitte wähle ein stärkeres.'
            if (m.includes('session') || m.includes('token') || m.includes('expired')) return 'Dieser Link ist abgelaufen. Bitte fordere einen neuen Reset-Link an.'
            if (m.includes('network') || m.includes('fetch')) return 'Verbindungsfehler. Bitte prüfe deine Internetverbindung.'
            return 'Fehler: ' + msg
        }

        // Supabase session aus URL-Hash wiederherstellen (Redirect von E-Mail)
        let sessionReady = false

        supabase.auth.onAuthStateChange((event, session) => {
            if (event === 'PASSWORD_RECOVERY' || (event === 'SIGNED_IN' && session)) {
                sessionReady = true
                document.getElementById('formBox').style.display = 'block'
                document.getElementById('invalidBox').style.display = 'none'
            }
        })

        // Fallback: bestehende Session prüfen
        const { data: { session } } = await supabase.auth.getSession()
        if (!session && !sessionReady) {
            document.getElementById('formBox').style.display = 'none'
            document.getElementById('invalidBox').style.display = 'block'
        }

        // Passwort Toggle
        document.getElementById('togglePass').addEventListener('click', () => {
            const input = document.getElementById('newPass')
            const icon = document.getElementById('eyeIcon')
            if (input.type === 'password') {
                input.type = 'text'
                icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>'
            } else {
                input.type = 'password'
                icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>'
            }
        })

        document.getElementById('resetBtn').addEventListener('click', async () => {
            const newPass = document.getElementById('newPass').value
            const confirmPass = document.getElementById('confirmPass').value
            const errorBox = document.getElementById('errorBox')
            const errorTxt = document.getElementById('errorText')
            const btn = document.getElementById('resetBtn')

            errorBox.classList.add('hidden')

            if (!newPass || !confirmPass) {
                errorTxt.textContent = 'Bitte beide Felder ausfüllen.'
                errorBox.classList.remove('hidden')
                return
            }
            if (newPass.length < 6) {
                errorTxt.textContent = 'Passwort muss mindestens 6 Zeichen lang sein.'
                errorBox.classList.remove('hidden')
                return
            }
            if (newPass !== confirmPass) {
                errorTxt.textContent = 'Passwörter stimmen nicht überein.'
                errorBox.classList.remove('hidden')
                return
            }

            btn.textContent = 'Wird gespeichert…'
            btn.disabled = true

            const { error } = await supabase.auth.updateUser({ password: newPass })

            if (error) {
                errorTxt.textContent = supabaseError(error.message)
                errorBox.classList.remove('hidden')
                btn.textContent = 'Passwort speichern'
                btn.disabled = false
            } else {
                document.getElementById('formBox').style.display = 'none'
                document.getElementById('successBox').style.display = 'block'
            }
        })

        // Navbar & Footer
        fetch('/de/partials/navbar.html').then(r => r.text()).then(d => {
            document.getElementById('navbar').innerHTML = d
            const toggle = document.querySelector('.menu-toggle')
            const navLinks = document.querySelector('.nav-links')
            const dropdown = document.querySelector('.dropdown')
            const dropdownLink = document.querySelector('.dropdown-link')
            toggle.addEventListener('click', () => {
                navLinks.classList.toggle('active')
                if (!navLinks.classList.contains('active')) dropdown.classList.remove('open')
            })
            dropdownLink.addEventListener('click', (e) => {
                if (window.innerWidth <= 768) {
                    if (!dropdown.classList.contains('open')) { e.preventDefault(); dropdown.classList.add('open') }
                }
            })
        })
        fetch('/de/partials/footer.html').then(r => r.text()).then(d => { document.getElementById('footer').innerHTML = d })
    </script>
</body>
</html>
