  </head>
  <body>
    <div id="navbar"></div>
    <h1 class="sr-only">Passwort zurÃ¼cksetzen</h1>
    <main class="login-wrapper">
      <div class="login-card">
        <div class="login-icon">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            xmlns="http://www.w3.org/2000/svg"
          >
            <defs>
              <linearGradient id="keyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#3399ff" />
                <stop offset="100%" stop-color="#66d9ff" />
              </linearGradient>
            </defs>
            <rect
              x="3"
              y="11"
              width="18"
              height="11"
              rx="2"
              ry="2"
              stroke="url(#keyGrad)"
              stroke-width="1.5"
              fill="url(#keyGrad)"
              fill-opacity="0.15"
            />
            <path
              d="M7 11V7a5 5 0 0 1 10 0v4"
              stroke="url(#keyGrad)"
              stroke-width="1.5"
              stroke-linecap="round"
            />
          </svg>
        </div>

        <h2>Neues Passwort</h2>
        <p class="login-subtitle">Gib dein neues Passwort ein</p>

        <div id="errorBox" class="error-box hidden">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <circle cx="12" cy="12" r="10" />
            <line x1="12" y1="8" x2="12" y2="12" />
            <line x1="12" y1="16" x2="12.01" y2="16" />
          </svg>
          <span id="errorText">Fehler beim ZurÃ¼cksetzen.</span>
        </div>

        <div
          id="invalidBox"
        >
          Dieser Link ist ungÃ¼ltig oder abgelaufen.<br />
          <a href="login.html">ZurÃ¼ck zum Login</a>
        </div>

        <div id="formBox">
          <div class="form-group">
            <label for="newPass">Neues Passwort</label>
            <div class="input-wrapper">
              <svg
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
                <path d="M7 11V7a5 5 0 0 1 10 0v4" />
              </svg>
              <input
                type="password"
                id="newPass"
                placeholder="Neues Passwort (min. 6 Zeichen)"
                autocomplete="new-password"
              />
              <button
                class="password-toggle"
                type="button"
                id="togglePass"
                aria-label="Passwort anzeigen"
              >
                <svg
                  id="eyeIcon"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                >
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                  <circle cx="12" cy="12" r="3" />
                </svg>
              </button>
            </div>
          </div>

          <div class="form-group">
            <label for="confirmPass">Passwort bestÃ¤tigen</label>
            <div class="input-wrapper">
              <svg
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
                <path d="M7 11V7a5 5 0 0 1 10 0v4" />
              </svg>
              <input
                type="password"
                id="confirmPass"
                placeholder="Passwort wiederholen"
                autocomplete="new-password"
              />
            </div>
          </div>

          <button class="login-btn" id="resetBtn">Passwort speichern</button>
        </div>

        <div id="successBox">
          <div class="success-message"
          >
            Passwort erfolgreich geÃ¤ndert!
          </div>
          <a href="login.html" class="login-btn">Zum Login</a>
        </div>
      </div>
    <div id="footer"></div>
    <script src="/js/navbar-loader.js"></script>
    <script type="module" src="/js/reset-password-de.js"></script>
