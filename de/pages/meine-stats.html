<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Meine Sicherheitsübersicht – SafeNet Security</title>
    <meta name="description" content="Persönliche Auswertung deiner gespeicherten Passwörter: Stärke, Duplikate, Kategorien und Empfehlungen." />
    <link rel="canonical" href="https://safenet-security.ch/de/pages/meine-stats.html" />
    <link rel="alternate" hreflang="de" href="https://safenet-security.ch/de/pages/meine-stats.html" />
    <link rel="alternate" hreflang="en" href="https://safenet-security.ch/en/pages/meine-stats.html" />
    <link rel="icon" type="image/png" href="/images/SafeNet-Security-Logo/Withoutbg/SafeNet Security 48 x 48 px.png" />
    <link rel="stylesheet" href="/css/navbar.css" />
    <link rel="stylesheet" href="/css/style.css" />
    <link rel="stylesheet" href="/css/shared.css" />
    <link rel="stylesheet" href="/css/footer.css" />
    <link rel="stylesheet" href="/css/meine-stats.css" />
    <script type="module" src="/js/auth.js?v=8"></script>
  </head>
  <body>
    <div id="navbar"></div>

    <main class="stats-main">
      <h1>Meine Sicherheitsübersicht</h1>
      <p class="stats-subtitle">Analyse deiner im Tresor gespeicherten Passwörter</p>

      <div id="stats-root">
        <p class="stats-loading" id="stats-loading">Lade Tresor-Daten…</p>
      </div>
    </main>

    <div id="footer"></div>

    <script type="module">
    import { supabase } from '/js/supabase.js';

    const root = document.getElementById('stats-root');

    // ── Crypto (identisch mit tresor.js) ──────────────────────────────
    async function deriveKey(password, salt) {
      const enc = new TextEncoder();
      const km  = await crypto.subtle.importKey('raw', enc.encode(password), 'PBKDF2', false, ['deriveKey']);
      return crypto.subtle.deriveKey(
        { name: 'PBKDF2', salt: enc.encode(salt), iterations: 100000, hash: 'SHA-256' },
        km,
        { name: 'AES-GCM', length: 256 },
        false, ['encrypt', 'decrypt']
      );
    }

    async function decryptValue(encStr, key) {
      try {
        const data = Uint8Array.from(atob(encStr.slice(4)), c => c.charCodeAt(0));
        const plain = await crypto.subtle.decrypt({ name: 'AES-GCM', iv: data.slice(0, 12) }, key, data.slice(12));
        return new TextDecoder().decode(plain);
      } catch { return null; }
    }

    function passwordScore(pw) {
      if (!pw) return 0;
      const COMMON = ['123456','password','12345678','qwerty','12345','123456789','letmein','admin','welcome','123123','passw0rd','iloveyou','hallo','hallo123','passwort','test','abc123','000000','111111'];
      const isCommon = COMMON.some(w => pw.toLowerCase().includes(w));
      let s = 0;
      if (pw.length >= 8)  s += 15;
      if (pw.length >= 12) s += 20;
      if (pw.length >= 16) s += 15;
      if (/[a-z]/.test(pw)) s += 10;
      if (/[A-Z]/.test(pw)) s += 10;
      if (/[0-9]/.test(pw)) s += 10;
      if (/[^A-Za-z0-9]/.test(pw)) s += 20;
      if (isCommon) s = Math.max(0, s - 35);
      return Math.min(100, s);
    }

    // ── Vault API ─────────────────────────────────────────────────────
    async function fetchVault(accessToken) {
      const url = new URL('/api/vault', window.location.origin);
      const ctrl = new AbortController();
      const timer = setTimeout(() => ctrl.abort(), 15000);
      try {
        const res = await fetch(url.toString(), {
          method: 'GET',
          signal: ctrl.signal,
          headers: { 'Authorization': `Bearer ${accessToken}`, 'Content-Type': 'application/json' }
        });
        clearTimeout(timer);
        return res.ok ? await res.json() : [];
      } catch { clearTimeout(timer); return []; }
    }

    // ── Render ────────────────────────────────────────────────────────
    function scoreColor(s) {
      if (s >= 70) return '#4ade80';
      if (s >= 40) return '#fb923c';
      return '#ef4444';
    }

    function scoreVerdict(s) {
      if (s >= 80) return { text: 'Ausgezeichnet 🛡️', css: 'color:#4ade80;-webkit-text-fill-color:#4ade80;' };
      if (s >= 65) return { text: 'Gut',              css: 'color:#86efac;-webkit-text-fill-color:#86efac;' };
      if (s >= 45) return { text: 'Ausbaufähig',      css: 'color:#fb923c;-webkit-text-fill-color:#fb923c;' };
      return              { text: 'Verbesserungsbedarf', css: 'color:#f87171;-webkit-text-fill-color:#f87171;' };
    }

    const KATEGORIEN_DE = {
      allgemein: 'Allgemein', banking: 'Banking', email: 'E-Mail',
      sozial: 'Soziale Medien', shopping: 'Shopping', arbeit: 'Arbeit',
      gaming: 'Gaming', sonstiges: 'Sonstiges',
    };

    function renderStats(entries) {
      if (entries.length === 0) {
        root.innerHTML = '<p class="stats-login-hint">Noch keine Passwörter im Tresor gespeichert. <a href="/de/pages/tresor.html">Zum Tresor →</a></p>';
        return;
      }

      const total   = entries.length;
      const scores  = entries.map(e => passwordScore(e.value ?? ''));
      const avg     = Math.round(scores.reduce((a, b) => a + b, 0) / total);
      const strong  = scores.filter(s => s >= 60).length;
      const medium  = scores.filter(s => s >= 40 && s < 60).length;
      const weak    = scores.filter(s => s < 40).length;

      // Duplikate
      const valCount = {};
      entries.forEach(e => { if (e.value) valCount[e.value] = (valCount[e.value] || 0) + 1; });
      const dups = entries.filter(e => e.value && valCount[e.value] > 1).length;

      // Kategorien
      const katCount = {};
      entries.forEach(e => {
        const k = e.kategorie || 'allgemein';
        katCount[k] = (katCount[k] || 0) + 1;
      });

      // Score-Ring (Umfang bei r=42: ~264)
      const circ      = 264;
      const dashOffset = Math.round(circ - (avg / 100) * circ);
      const ringColor  = scoreColor(avg);
      const verdict    = scoreVerdict(avg);

      // Empfehlungen
      const recs = [];
      if (weak > 0)  recs.push({ icon: '🔴', title: `${weak} schwache Passwörter`, text: 'Ersetze sie durch sichere Passwörter mit mind. 12 Zeichen.', link: '/de/pages/generator.html', linkText: 'Generator öffnen' });
      if (dups > 0)  recs.push({ icon: '🟠', title: `${dups} doppelte Passwörter`, text: 'Verwende für jeden Dienst ein einzigartiges Passwort.', link: '/de/pages/analysator.html', linkText: 'Analyse öffnen' });
      if (medium > 0) recs.push({ icon: '🟡', title: `${medium} mittelmässige Passwörter`, text: 'Füge Sonderzeichen hinzu und erhöhe die Länge auf ≥ 16 Zeichen.' });
      if (recs.length === 0) recs.push({ icon: '✅', title: 'Alles top!', text: 'Deine Passwörter sehen gut aus. Bleib dran und prüfe sie regelmässig.' });

      root.innerHTML = `
        <!-- Score-Ring -->
        <div class="stats-score-section">
          <div class="score-ring-wrap">
            <svg class="score-ring" viewBox="0 0 100 100">
              <circle class="score-ring-bg" cx="50" cy="50" r="42"/>
              <circle class="score-ring-fill" id="ring-fill" cx="50" cy="50" r="42"
                stroke="${ringColor}"
                stroke-dasharray="${circ}"
                stroke-dashoffset="${circ}"/>
            </svg>
            <div class="score-center">
              <span class="score-number" id="score-num">0</span>
              <span class="score-label">/ 100</span>
            </div>
          </div>
          <div class="score-verdict" style="${verdict.css}">${verdict.text}</div>
          <div class="score-meta">${total} Passwörter im Tresor</div>
        </div>

        <!-- Qualitätsverteilung -->
        <div class="stats-section-card">
          <h2>Passwortqualität</h2>
          <div class="quality-bar-item">
            <span class="quality-label">Stark</span>
            <div class="quality-track"><div class="quality-fill quality-fill-strong" data-w="${total ? Math.round(strong/total*100) : 0}"></div></div>
            <span class="quality-count">${strong} / ${total}</span>
          </div>
          <div class="quality-bar-item">
            <span class="quality-label">Mittel</span>
            <div class="quality-track"><div class="quality-fill quality-fill-medium" data-w="${total ? Math.round(medium/total*100) : 0}"></div></div>
            <span class="quality-count">${medium} / ${total}</span>
          </div>
          <div class="quality-bar-item">
            <span class="quality-label">Schwach</span>
            <div class="quality-track"><div class="quality-fill quality-fill-weak" data-w="${total ? Math.round(weak/total*100) : 0}"></div></div>
            <span class="quality-count">${weak} / ${total}</span>
          </div>
        </div>

        <!-- Warnungen -->
        <div class="stats-section-card">
          <h2>Warnungen</h2>
          <div class="stats-warnings">
            ${dups > 0 ? `<div class="stats-warning-item orange"><span class="warn-icon">⚠️</span><span><strong>${dups} doppelte Passwörter</strong> gefunden – Sicherheitsrisiko!</span></div>` : ''}
            ${weak > 0 ? `<div class="stats-warning-item red"><span class="warn-icon">🛑</span><span><strong>${weak} Passwörter zu schwach</strong> – ersetze sie durch stärkere.</span></div>` : ''}
            ${dups === 0 && weak === 0 ? `<div class="stats-warning-item green"><span class="warn-icon">✅</span><span>Keine kritischen Probleme gefunden.</span></div>` : ''}
          </div>
        </div>

        <!-- Kategorien -->
        <div class="stats-section-card">
          <h2>Kategorien</h2>
          <div class="category-grid">
            ${Object.entries(katCount).map(([k, n]) => `
              <div class="category-item">
                <span class="category-name">${KATEGORIEN_DE[k] ?? k}</span>
                <span class="category-count">${n}</span>
              </div>`).join('')}
          </div>
        </div>

        <!-- Empfehlungen -->
        <div class="stats-section-card">
          <h2>Empfehlungen</h2>
          <div class="recs-grid">
            ${recs.map(r => `
              <div class="rec-item">
                <span class="rec-icon">${r.icon}</span>
                <div class="rec-text">
                  <strong>${r.title}</strong>${r.text}
                  ${r.link ? `<a class="rec-link" href="${r.link}">${r.linkText} →</a>` : ''}
                </div>
              </div>`).join('')}
          </div>
        </div>
      `;

      // Animationen nach DOM-Einfügen
      requestAnimationFrame(() => {
        // Score-Ring animieren
        const fill = document.getElementById('ring-fill');
        const numEl = document.getElementById('score-num');
        if (fill) fill.style.transition = 'stroke-dashoffset 1.4s cubic-bezier(0.25, 1, 0.5, 1)';
        requestAnimationFrame(() => {
          if (fill) fill.style.strokeDashoffset = dashOffset;
        });

        // Score-Zähler animieren
        const duration = 1400;
        const start = performance.now();
        function tick(now) {
          const t = Math.min((now - start) / duration, 1);
          const ease = 1 - Math.pow(1 - t, 3);
          if (numEl) numEl.textContent = Math.round(ease * avg);
          if (t < 1) requestAnimationFrame(tick);
        }
        requestAnimationFrame(tick);

        // Qualitätsbalken animieren
        document.querySelectorAll('.quality-fill[data-w]').forEach(el => {
          requestAnimationFrame(() => { el.style.width = el.dataset.w + '%'; });
        });
      });
    }

    // ── Main ──────────────────────────────────────────────────────────
    (async () => {
      // Session lesen
      let session = null;
      try {
        const raw = localStorage.getItem('sb-dygrabyaiyessqmjdprc-auth-token');
        if (raw) session = JSON.parse(raw);
      } catch {}

      const { data: { session: live } } = await supabase.auth.getSession();
      session = live ?? session;

      if (!session?.access_token) {
        root.innerHTML = '<p class="stats-login-hint">Bitte <a href="/de/pages/login.html">einloggen</a>, um deine Sicherheitsübersicht zu sehen.</p>';
        return;
      }

      // Master-Key ableiten
      let key;
      try { key = await deriveKey(session.user.id, session.user.id); }
      catch { root.innerHTML = '<p class="stats-loading">Verschlüsselungsfehler. Bitte Seite neu laden.</p>'; return; }

      // Vault laden
      const raw = await fetchVault(session.access_token);
      if (!Array.isArray(raw)) { root.innerHTML = '<p class="stats-loading">Fehler beim Laden des Tresors.</p>'; return; }

      // Entschlüsseln
      const entries = await Promise.all(
        raw.filter(e => !e.label?.startsWith('__'))
           .map(async e => {
             const val = e.value?.startsWith('ENC:') ? await decryptValue(e.value, key) : e.value;
             return { ...e, value: val ?? '' };
           })
      );

      renderStats(entries);
    })();
    </script>

    <script>
      fetch('/de/partials/navbar.html').then(r => r.text()).then(d => {
        document.getElementById('navbar').innerHTML = d;
        const toggle = document.querySelector('.menu-toggle');
        const navLinks = document.querySelector('.nav-links');
        const dropdowns = document.querySelectorAll('.dropdown');
        if (toggle) {
          toggle.addEventListener('click', () => {
            navLinks.classList.toggle('active');
            toggle.setAttribute('aria-expanded', navLinks.classList.contains('active'));
          });
        }
        dropdowns.forEach(dd => {
          const link = dd.querySelector('.dropdown-link');
          if (link) {
            link.addEventListener('click', e => {
              if (window.innerWidth <= 768) { e.preventDefault(); dd.classList.toggle('open'); }
            });
          }
        });
      });
      fetch('/de/partials/footer.html').then(r => r.text()).then(d => { document.getElementById('footer').innerHTML = d; });
    </script>
  </body>
</html>
