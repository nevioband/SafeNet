<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Security-News – SafeNet Security</title>
    <meta name="description" content="Aktuelle Cybersecurity-News aus bekannten Quellen – The Hacker News, Bleeping Computer und Heise Security." />
    <link rel="canonical" href="https://safenet-security.ch/de/pages/news.html" />
    <link rel="alternate" hreflang="de" href="https://safenet-security.ch/de/pages/news.html" />
    <link rel="alternate" hreflang="en" href="https://safenet-security.ch/en/pages/news.html" />
    <link rel="icon" type="image/png" href="/images/SafeNet-Security-Logo/Withoutbg/SafeNet Security 48 x 48 px.png" />
    <link rel="stylesheet" href="/css/navbar.css" />
    <link rel="stylesheet" href="/css/style.css" />
    <link rel="stylesheet" href="/css/shared.css" />
    <link rel="stylesheet" href="/css/footer.css" />
    <link rel="stylesheet" href="/css/news.css" />
    <script type="module" src="/js/auth.js?v=8"></script>
  </head>
  <body>
    <div id="navbar"></div>

    <main class="news-main">
      <div class="np-masthead">
        <h1>Security-News</h1>
        <p class="np-masthead-sub">Cybersicherheit &middot; Täglich aktualisiert</p>
      </div>
      <hr class="np-rule" />
      <div id="news-root">
        <p class="np-loading">Nachrichten werden geladen…</p>
      </div>
    </main>

    <div id="footer"></div>

    <script>
      function formatDate(iso) {
        if (!iso) return '';
        try { return new Date(iso).toLocaleDateString('de-CH', { day: 'numeric', month: 'long', year: 'numeric' }); }
        catch { return ''; }
      }

      function escHtml(str) {
        return String(str ?? '')
          .replace(/&/g, '&amp;').replace(/</g, '&lt;')
          .replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
      }

      function safeUrl(url) { return /^https?:\/\//.test(url ?? '') ? url : '#'; }

      const SRC_CLASS = {
        'The Hacker News': 'src-thn',
        'Bleeping Computer': 'src-bc',
        'Heise Security': 'src-heise',
      };

      function badge(s) {
        return `<span class="np-source ${SRC_CLASS[s] || 'src-other'}">${escHtml(s)}</span>`;
      }

      function metaRow(item) {
        return `<div class="np-meta">
          <time class="np-date">${escHtml(formatDate(item.date))}</time>
          <a href="${safeUrl(item.link)}" class="np-readmore" target="_blank" rel="noopener noreferrer">Weiterlesen →</a>
        </div>`;
      }

      function renderFeatured(item) {
        const desc = item.description || '';
        return `<article class="np-featured">
          ${badge(item.source)}
          <h2 class="np-featured-title">${escHtml(item.title)}</h2>
          ${desc ? `<p class="np-featured-desc">${escHtml(desc)}${desc.length >= 260 ? '…' : ''}</p>` : ''}
          ${metaRow(item)}
        </article>`;
      }

      function renderArticle(item) {
        const desc = item.description || '';
        const d = desc.slice(0, 200);
        return `<article class="np-article">
          ${badge(item.source)}
          <h3 class="np-title">${escHtml(item.title)}</h3>
          ${d ? `<p class="np-desc">${escHtml(d)}${desc.length > 200 ? '…' : ''}</p>` : ''}
          ${metaRow(item)}
        </article>`;
      }

      function renderCard(item) {
        const desc = item.description || '';
        const d = desc.slice(0, 130);
        return `<article class="np-card">
          ${badge(item.source)}
          <h3 class="np-title">${escHtml(item.title)}</h3>
          ${d ? `<p class="np-desc">${escHtml(d)}${desc.length > 130 ? '…' : ''}</p>` : ''}
          ${metaRow(item)}
        </article>`;
      }

      async function loadNews() {
        const root = document.getElementById('news-root');
        try {
          const res = await fetch('/api/news');
          if (!res.ok) throw new Error(`Server-Fehler ${res.status}`);
          const data = await res.json();
          if (data.error) throw new Error(data.error);
          const items = data.items ?? [];
          if (!items.length) throw new Error('Keine Nachrichten erhalten');

          const [top, ...rest] = items;
          const secondary = rest.slice(0, 2);
          const grid      = rest.slice(2);

          let html = renderFeatured(top);
          if (secondary.length) {
            html += '<hr class="np-rule-thin" />';
            html += `<div class="np-secondary">${secondary.map(renderArticle).join('')}</div>`;
          }
          if (grid.length) {
            html += '<hr class="np-rule-thin" />';
            html += `<div class="np-grid">${grid.map(renderCard).join('')}</div>`;
          }
          root.innerHTML = html;
        } catch (e) {
          root.innerHTML = `<p class="np-error">Fehler beim Laden der News: ${escHtml(e.message)}</p>`;
        }
      }

      loadNews();

      fetch('/de/partials/navbar.html').then(r => r.text()).then(d => {
        document.getElementById('navbar').innerHTML = d;
        const toggle   = document.querySelector('.menu-toggle');
        const navLinks = document.querySelector('.nav-links');
        const dropdowns = document.querySelectorAll('.dropdown');
        if (toggle) {
          toggle.addEventListener('click', () => {
            navLinks.classList.toggle('active');
            toggle.setAttribute('aria-expanded', navLinks.classList.contains('active'));
          });
        }
        dropdowns.forEach(dd => {
          const link = dd.querySelector('.dropdown-link');
          if (link) {
            link.addEventListener('click', e => {
              if (window.innerWidth <= 768) { e.preventDefault(); dd.classList.toggle('open'); }
            });
          }
        });
      });
      fetch('/de/partials/footer.html').then(r => r.text()).then(d => { document.getElementById('footer').innerHTML = d; });
    </script>
  </body>
</html>
