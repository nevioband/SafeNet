<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrieren – SafeNet Security</title>
    <link rel="stylesheet" href="../css/navbar.css">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/shared.css">
    <link rel="stylesheet" href="../css/footer.css">
    <link rel="stylesheet" href="../css/login.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <link rel="icon" type="image/png" href="../images/SafeNet-Security-Logo/Withoutbg/SafeNet Security 48 x 48 px.png">
</head>
<body>
    <div id="navbar"></div>

    <main class="login-wrapper">
        <div class="login-card">

            <div class="login-icon">
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <linearGradient id="regGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" style="stop-color:#3399ff"/>
                            <stop offset="100%" style="stop-color:#66d9ff"/>
                        </linearGradient>
                    </defs>
                    <circle cx="12" cy="8" r="4" stroke="url(#regGrad)" stroke-width="1.5" fill="url(#regGrad)" fill-opacity="0.2"/>
                    <path d="M4 20c0-4 3.58-7 8-7s8 3 8 7" stroke="url(#regGrad)" stroke-width="1.5" stroke-linecap="round"/>
                    <line x1="19" y1="3" x2="19" y2="7" stroke="url(#regGrad)" stroke-width="1.5" stroke-linecap="round"/>
                    <line x1="17" y1="5" x2="21" y2="5" stroke="url(#regGrad)" stroke-width="1.5" stroke-linecap="round"/>
                </svg>
            </div>

            <h2>Konto erstellen</h2>
            <p class="login-subtitle">Registriere dich bei SafeNet Security</p>

            <div id="errorBox" class="error-box hidden">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
                </svg>
                <span id="errorText">Bitte alle Felder ausfüllen.</span>
            </div>

            <div id="successBox" class="hidden" style="background:rgba(34,197,94,0.12);border:1px solid rgba(34,197,94,0.4);border-radius:8px;color:#86efac;font-size:13px;padding:10px 14px;margin-bottom:18px;display:none;align-items:center;gap:8px;">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16" style="flex-shrink:0;color:#22c55e">
                    <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/>
                </svg>
                <span id="successText">Registrierung erfolgreich! Bitte bestätige deine E-Mail.</span>
            </div>

            <div class="form-group">
                <label for="regEmail">E-Mail-Adresse</label>
                <div class="input-wrapper">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="2" y="4" width="20" height="16" rx="2"/><path d="M2 7l10 7 10-7"/>
                    </svg>
                    <input type="email" id="regEmail" placeholder="E-Mail eingeben" autocomplete="email">
                </div>
            </div>

            <div class="form-group">
                <label for="regPass">Passwort</label>
                <div class="input-wrapper">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                    </svg>
                    <input type="password" id="regPass" placeholder="Passwort wählen (min. 6 Zeichen)" autocomplete="new-password">
                    <button class="password-toggle" type="button" id="togglePass" aria-label="Passwort anzeigen">
                        <svg id="eyeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                        </svg>
                    </button>
                </div>
            </div>

            <div class="form-group">
                <label for="regPassConfirm">Passwort bestätigen</label>
                <div class="input-wrapper">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                    </svg>
                    <input type="password" id="regPassConfirm" placeholder="Passwort wiederholen" autocomplete="new-password">
                </div>
            </div>

            <button class="login-btn" id="registerBtn">Registrieren</button>

            <div class="login-footer">
                Bereits registriert? <a href="login.html">Jetzt einloggen</a>
            </div>
        </div>
    </main>

    <div id="footer"></div>

    <script type="module">
        import { supabase } from '../js/supabase.js'

        function supabaseError(msg) {
            if (!msg) return 'Ein unbekannter Fehler ist aufgetreten.'
            const m = msg.toLowerCase()
            if (m.includes('user already registered') || m.includes('already been registered')) return 'Diese E-Mail-Adresse ist bereits registriert.'
            if (m.includes('invalid email') || m.includes('unable to validate email')) return 'Bitte gib eine gültige E-Mail-Adresse ein.'
            if (m.includes('password should be at least')) return 'Das Passwort muss mindestens 6 Zeichen lang sein.'
            if (m.includes('too many requests') || m.includes('rate limit')) return 'Zu viele Versuche. Bitte warte einen Moment.'
            if (m.includes('network') || m.includes('fetch')) return 'Verbindungsfehler. Bitte prüfe deine Internetverbindung.'
            return 'Fehler: ' + msg
        }

        function showError(text) {
            document.getElementById('errorText').textContent = text
            document.getElementById('errorBox').classList.remove('hidden')
        }

        // Passwort Toggle
        document.getElementById('togglePass').addEventListener('click', function () {
            const input = document.getElementById('regPass')
            const icon = document.getElementById('eyeIcon')
            if (input.type === 'password') {
                input.type = 'text'
                icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>'
            } else {
                input.type = 'password'
                icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>'
            }
        })

        // Registrierung
        document.getElementById('registerBtn').addEventListener('click', async () => {
            const email    = document.getElementById('regEmail').value.trim()
            const password = document.getElementById('regPass').value
            const confirm  = document.getElementById('regPassConfirm').value
            const successBox = document.getElementById('successBox')
            const btn      = document.getElementById('registerBtn')

            document.getElementById('errorBox').classList.add('hidden')
            successBox.style.display = 'none'

            if (!email || !password || !confirm) {
                showError('Bitte alle Felder ausfüllen.')
                return
            }
            if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                showError('Bitte gib eine gültige E-Mail-Adresse ein.')
                return
            }
            if (password.length < 6) {
                showError('Passwort muss mindestens 6 Zeichen lang sein.')
                return
            }
            if (password !== confirm) {
                showError('Passwörter stimmen nicht überein.')
                return
            }

            btn.textContent = 'Wird registriert…'
            btn.disabled = true

            const { error } = await supabase.auth.signUp({ email, password })

            if (error) {
                showError(supabaseError(error.message))
                btn.textContent = 'Registrieren'
                btn.disabled = false
            } else {
                successBox.style.display = 'flex'
                btn.textContent = 'Registriert!'
                setTimeout(() => { window.location.href = 'login.html' }, 3000)
            }
        })

        // Enter-Taste
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') document.getElementById('registerBtn').click()
        })

        // Navbar & Footer laden
        fetch('../partials/navbar.html').then(r => r.text()).then(d => {
            document.getElementById('navbar').innerHTML = d
            const toggle = document.querySelector('.menu-toggle')
            const navLinks = document.querySelector('.nav-links')
            const dropdown = document.querySelector('.dropdown')
            const dropdownLink = document.querySelector('.dropdown-link')
            toggle.addEventListener('click', () => {
                navLinks.classList.toggle('active')
                if (!navLinks.classList.contains('active')) dropdown.classList.remove('open')
            })
            dropdownLink.addEventListener('click', (e) => {
                if (window.innerWidth <= 768) {
                    if (!dropdown.classList.contains('open')) { e.preventDefault(); dropdown.classList.add('open') }
                }
            })
        })
        fetch('../partials/footer.html').then(r => r.text()).then(d => { document.getElementById('footer').innerHTML = d })
    </script>
</body>
</html>
