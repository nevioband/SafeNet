<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agent Test – SafeNet</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0f172a; color: #e2e8f0; font-family: Inter, sans-serif; display: flex; flex-direction: column; height: 100vh; }
    h1 { padding: 16px 20px; font-size: 1rem; background: #1e293b; border-bottom: 1px solid #334155; color: #66d9ff; }
    h1 span { font-size: 0.75rem; color: #94a3b8; margin-left: 8px; }
    #chat { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 10px; }
    .msg { max-width: 75%; padding: 10px 14px; border-radius: 12px; font-size: 0.9rem; line-height: 1.5; }
    .user { align-self: flex-end; background: #3399ff; color: #fff; border-bottom-right-radius: 4px; }
    .bot { align-self: flex-start; background: #1e293b; color: #e2e8f0; border-bottom-left-radius: 4px; border: 1px solid #334155; }
    .bot.loading { color: #64748b; font-style: italic; }
    #form { display: flex; gap: 8px; padding: 12px 16px; background: #1e293b; border-top: 1px solid #334155; }
    #input { flex: 1; background: #0f172a; color: #e2e8f0; border: 1px solid #334155; border-radius: 8px; padding: 10px 14px; font-size: 0.9rem; outline: none; }
    #input:focus { border-color: #3399ff; }
    button { background: #3399ff; color: #fff; border: none; border-radius: 8px; padding: 10px 18px; cursor: pointer; font-size: 0.9rem; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    #clear { background: #334155; font-size: 0.8rem; padding: 10px 12px; }
    .label { font-size: 0.7rem; color: #64748b; padding: 0 4px; align-self: flex-start; }
  </style>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
  <h1>Mistral Agent Test <span>ag_019e3ef5b56470d7be7db6e13cd92aa7</span></h1>
  <div id="chat">
    <div class="msg bot">Hallo! Ich bin der Mistral Agent. Stell mir eine Frage.</div>
  </div>
  <form id="form" onsubmit="return false">
    <button type="button" id="clear">Löschen</button>
    <input id="input" type="text" placeholder="Nachricht eingeben..." autocomplete="off" maxlength="1000">
    <button type="button" id="send">Senden</button>
  </form>

  <script>
    window.onerror = function(msg, src, line) {
      document.getElementById('chat').insertAdjacentHTML('beforeend',
        `<div class="msg bot" style="border-color:#ef4444;color:#ef4444">JS-Fehler: ${msg} (Zeile ${line})</div>`)
    }

    const chat = document.getElementById('chat')
    const form = document.getElementById('form')
    const input = document.getElementById('input')
    const sendBtn = document.getElementById('send')
    const clearBtn = document.getElementById('clear')

    let history = []

    function addMsg(text, role) {
      const div = document.createElement('div')
      div.className = 'msg ' + role
      div.textContent = text
      chat.appendChild(div)
      chat.scrollTop = chat.scrollHeight
      return div
    }

    sendBtn.addEventListener('click', async function() {
      const msg = input.value.trim()
      if (!msg) return

      input.value = ''
      sendBtn.disabled = true
      addMsg(msg, 'user')

      const loading = addMsg('Denkt nach…', 'bot loading')

      try {
        const res = await fetch('/api/agent', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: msg, history: history })
        })
        const text = await res.text()
        let reply
        try {
          const data = JSON.parse(text)
          reply = data.reply || data.error || 'Keine Antwort.'
        } catch {
          reply = 'Antwort-Fehler (HTTP ' + res.status + '): ' + text.slice(0, 300)
        }

        loading.textContent = reply
        loading.classList.remove('loading')

        history.push({ role: 'user', content: msg })
        history.push({ role: 'assistant', content: reply })
      } catch (e) {
        loading.textContent = 'Verbindungsfehler: ' + e.message
        loading.classList.remove('loading')
      }

      sendBtn.disabled = false
      input.focus()
    })

    clearBtn.addEventListener('click', function() {
      history = []
      chat.innerHTML = '<div class="msg bot">Hallo! Ich bin der Mistral Agent. Stell mir eine Frage.</div>'
    })

    input.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') sendBtn.click()
    })
  </script>
</body>
</html>
