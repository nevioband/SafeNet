<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Page not found – SafeNet Security</title>
    <meta name="robots" content="noindex" />
    <link rel="stylesheet" href="/css/style.css" />
    <link rel="stylesheet" href="/css/navbar.css" />
    <link rel="stylesheet" href="/css/footer.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet" />
    <link rel="icon" type="image/png" href="/images/SafeNet-Security-Logo/Withoutbg/SafeNet Security 48 x 48 px.png" />
    <script type="module" src="/js/auth.js?v=8"></script>
    <style>
      .error-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 60vh;
        text-align: center;
        padding: 40px 20px;
      }
      .error-code {
        font-size: 120px;
        font-weight: 900;
        background: linear-gradient(135deg, #3399ff, #66d9ff);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        line-height: 1;
        margin-bottom: 16px;
      }
      .error-title {
        font-size: 28px;
        color: #ffffff;
        margin-bottom: 16px;
      }
      .error-text {
        font-size: 16px;
        color: #94a3b8;
        margin-bottom: 36px;
        max-width: 400px;
      }
      .error-actions {
        display: flex;
        gap: 16px;
        flex-wrap: wrap;
        justify-content: center;
      }
      .btn-primary {
        text-decoration: none;
        padding: 14px 28px;
        border-radius: 10px;
        font-size: 16px;
        font-weight: 700;
        letter-spacing: 0.3px;
        background: linear-gradient(135deg, #3399ff, #66d9ff);
        color: #0b1220;
        box-shadow: 0 0 18px rgba(51, 153, 255, 0.45), 0 0 36px rgba(102, 217, 255, 0.2);
        transition: transform 0.2s, box-shadow 0.25s ease;
      }
      .btn-primary:hover {
        transform: translateY(-2px);
        box-shadow: 0 0 28px rgba(51, 153, 255, 0.65), 0 0 52px rgba(102, 217, 255, 0.35);
      }
    </style>
  </head>
  <body>
    <div id="navbar"></div>

    <div class="error-container">
      <div class="error-code">404</div>
      <h1 class="error-title">Page not found</h1>
      <p class="error-text">The page you are looking for does not exist or has been moved.</p>
      <div class="error-actions">
        <a href="/en/index.html" class="btn-primary">Back to Home</a>
      </div>
    </div>

    <div id="footer"></div>

    <script>
      const path = window.location.pathname;
      if (path.startsWith('/de')) {
        window.location.replace('/de/404.html');
      } else {
        window.location.replace('/en/404.html');
      }

      fetch("/en/partials/navbar.html")
        .then(r => r.text())
        .then(data => {
          document.getElementById("navbar").innerHTML = data;
          const toggle = document.querySelector(".menu-toggle");
          const navLinks = document.querySelector(".nav-links");
          const dropdown = document.querySelector(".dropdown");
          const dropdownLink = document.querySelector(".dropdown-link");
          toggle?.addEventListener("click", () => {
            navLinks.classList.toggle("active");
            if (!navLinks.classList.contains("active")) dropdown?.classList.remove("open");
          });
          dropdownLink?.addEventListener("click", e => {
            if (window.innerWidth <= 768 && !dropdown.classList.contains("open")) {
              e.preventDefault();
              dropdown.classList.add("open");
            }
          });
        });

      fetch("/en/partials/footer.html")
        .then(r => r.text())
        .then(data => { document.getElementById("footer").innerHTML = data; });
    </script>
  </body>
</html>
